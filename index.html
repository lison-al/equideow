<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equideow - Gestionnaire de comptes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     EQUIDEOW-INSPIRED THEME
     Light: Parchemin chaud (warm parchment, ancient grimoire)
     Dark: Charbon & or (sober charcoal with golden accents)
     ============================================================ */
  :root {
    /* Typography */
    --font-display: 'Cinzel Decorative', 'Cinzel', Georgia, serif;  /* large titles */
    --font-title: 'Cormorant SC', Georgia, serif;                   /* panel titles, labels */
    --font-body: Georgia, 'Palatino Linotype', 'Book Antiqua', Palatino, serif;

    /* Light theme: Parchemin chaud */
    --bg: #f5efd9;              /* warm parchment background */
    --bg-pattern: #ebe4c4;      /* slightly darker for depth */
    --surface: #fffaeb;         /* lighter parchment for cards */
    --surface-2: #ebe4c4;       /* secondary surface */
    --surface-3: #ddd4a8;       /* tertiary, for hover states */
    --text: #3a2f10;            /* deep warm brown for body text */
    --text-muted: #6b5a2e;      /* faded warm brown */
    --text-light: #9b8c5e;      /* very faded */
    --text-title: #5d4e1a;      /* deep gold-brown for section titles */
    --text-highlight: #8b2a1f;  /* brick red for item names (like the game) */
    --border: rgba(93, 78, 26, 0.25);
    --border-strong: rgba(93, 78, 26, 0.45);
    --accent: #8b6f1a;          /* darker gold accent for buttons */
    --accent-bg: #f0e4b0;
    --accent-strong: #5d4e1a;
    --warning: #8a5a08;         /* warm amber */
    --warning-bg: #f5e0a8;
    --danger: #8b2a1f;          /* brick red */
    --danger-bg: #f0c5b5;
    --success: #4a6817;         /* meadow green */
    --success-bg: #d8e0a0;
    --gold: #b8860b;            /* rich gold accent */
    --gold-bg: #f0dc94;
    --radius: 6px;
    --radius-lg: 10px;
    --shadow-soft: 0 2px 4px rgba(93, 78, 26, 0.08);
    --shadow-strong: 0 4px 12px rgba(93, 78, 26, 0.18);
  }

  [data-theme="dark"] {
    /* Dark theme: Charbon & or */
    --bg: #1a1815;              /* deep charcoal */
    --bg-pattern: #221f1a;
    --surface: #28251f;         /* charcoal surface for cards */
    --surface-2: #322e26;       /* secondary surface */
    --surface-3: #3f3a30;       /* hover */
    --text: #e8d8a8;            /* warm cream */
    --text-muted: #b5a878;
    --text-light: #908068;
    --text-title: #e8d8a8;      /* warm gold-cream for titles */
    --text-highlight: #d8a878;  /* soft warm gold for items (replaces brick) */
    --border: rgba(232, 216, 168, 0.18);
    --border-strong: rgba(232, 216, 168, 0.35);
    --accent: #c4a050;          /* rich antique gold */
    --accent-bg: #3a3525;
    --accent-strong: #d8b870;
    --warning: #d8a850;
    --warning-bg: #3a2c08;
    --danger: #d88068;
    --danger-bg: #4a2218;
    --success: #a8b870;
    --success-bg: #2e3518;
    --gold: #d8b557;
    --gold-bg: #3a2f10;
    --shadow-soft: 0 2px 4px rgba(0, 0, 0, 0.3);
    --shadow-strong: 0 4px 12px rgba(0, 0, 0, 0.5);
  }
  * { box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    /* Subtle parchment texture using overlaid gradient */
    background-image:
      radial-gradient(at 20% 30%, var(--bg-pattern) 0%, transparent 60%),
      radial-gradient(at 80% 70%, var(--bg-pattern) 0%, transparent 50%);
    color: var(--text);
    margin: 0;
    padding: 0;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* ============================================================
     LAYOUT: sidebar + main content
     ============================================================ */
  .app-layout {
    display: flex;
    min-height: 100vh;
    align-items: stretch;
  }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border-strong);
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    box-shadow: var(--shadow-soft);
  }
  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .sidebar-header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 15%; right: 15%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.6;
  }
  .sidebar-title {
    font-size: 15px;
    font-weight: 700;
    margin: 0;
    color: var(--text-title);
    font-family: var(--font-display);
    letter-spacing: 0.02em;
    text-shadow: 0 1px 0 var(--surface);
    white-space: nowrap;
  }
  .sidebar-actions {
    display: flex;
    gap: 3px;
    flex-wrap: nowrap;
  }
  .icon-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 4px 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
    transition: all 0.15s;
    min-width: 26px;
    text-align: center;
  }
  .icon-btn:hover {
    background: var(--surface-2);
    border-color: var(--border);
  }
  .sidebar-backup {
    display: flex;
    justify-content: center;
  }
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
    padding: 0 4px;
  }
  .main-content {
    flex: 1;
    min-width: 0;
    padding: 14px 20px 20px;
    overflow-x: hidden;
  }
  .main-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* ============================================================
     RESPONSIVE: sidebar wraps to top on narrow viewports
     ============================================================ */
  @media (max-width: 720px) {
    .app-layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      height: auto;
      position: relative;
      border-right: none;
      border-bottom: 1px solid var(--border-strong);
    }
    .main-content { padding: 12px; }
    /* Sur petit écran, on autorise à nouveau le retour à la ligne pour éviter le débordement horizontal */
    .main-toolbar, .server-bar, .view-tabs { flex-wrap: wrap; }
    .view-tabs { margin-left: 0; }
  }

  .backup-status {
    font-size: 11px; padding: 3px 8px;
    border-radius: var(--radius);
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success);
    display: inline-flex; align-items: center; gap: 4px;
    font-weight: 600;
    width: 100%;
    justify-content: center;
  }
  .backup-status.warn { background: var(--warning-bg); color: var(--warning); border-color: var(--warning); }
  .backup-status.danger { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

  .sidebar-cloud { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
  .cloud-status {
    flex: 1; min-width: 0;
    font-size: 11px; padding: 3px 8px;
    border-radius: var(--radius);
    background: var(--surface-2); color: var(--text-muted);
    border: 1px solid var(--border);
    display: inline-flex; align-items: center; gap: 4px;
    font-weight: 600; justify-content: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cloud-status.ok { background: var(--success-bg); color: var(--success); border-color: var(--success); }
  .cloud-status.new { background: var(--gold-bg); color: var(--accent-strong); border-color: var(--gold); cursor: pointer; }
  .cloud-status.off { background: var(--surface-2); color: var(--text-light); }
  .cloud-sync-btn { flex: 0 0 auto; width: 28px; }
  .cloud-sync-btn.spinning { animation: cloudspin 0.8s linear infinite; }
  @keyframes cloudspin { to { transform: rotate(360deg); } }
  .cloud-viewer-toggle {
    font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
    padding: 4px 4px 0; cursor: pointer; user-select: none;
  }
  .cloud-viewer-toggle input { cursor: pointer; }

  /* Indicateurs condensés (icônes + infobulle) */
  .status-bar { display: flex; align-items: center; gap: 6px; }
  .status-icon {
    font-size: 14px; line-height: 1;
    padding: 4px 6px; border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface-2);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default; user-select: none;
  }
  .status-icon.ok     { box-shadow: inset 0 0 0 2px var(--success); }
  .status-icon.warn   { box-shadow: inset 0 0 0 2px var(--warning); }
  .status-icon.danger { box-shadow: inset 0 0 0 2px var(--danger); }
  .status-icon.new    { box-shadow: inset 0 0 0 2px var(--gold); cursor: pointer; }
  .status-icon.off    { opacity: 0.5; }
  .status-sync { flex: 0 0 auto; width: 28px; }
  .status-auto {
    font-size: 11px; color: var(--text-muted);
    display: inline-flex; align-items: center; gap: 4px;
    cursor: pointer; user-select: none; margin-left: auto;
  }
  .status-auto input { cursor: pointer; }

  /* Barre de recherche fixe en haut du contenu principal */
  .top-search-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    padding: 8px 0 10px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .top-search-bar .global-search-container { max-width: 460px; }
  .global-search-container {
    position: relative;
  }
  .global-search-input {
    width: 100%;
    padding: 7px 10px;
    font-size: 13px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    height: 34px;
    box-shadow: var(--shadow-soft);
  }
  .global-search-input:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
  }
  .global-search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 380px;
    max-width: calc(100vw - 30px);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: var(--shadow-strong);
    max-height: 70vh;
    overflow-y: auto;
    z-index: 60;
  }
  .global-search-empty {
    padding: 16px;
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
    font-size: 13px;
  }
  .gsr-item-group {
    border-bottom: 1px solid var(--border);
  }
  .gsr-item-group:last-child { border-bottom: none; }
  .gsr-item-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px 6px;
    background: var(--surface-2);
    font-family: var(--font-title);
    font-weight: 600;
    color: var(--text-title);
  }
  .gsr-item-header img {
    width: 24px; height: 24px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .gsr-item-header .name { flex: 1; }
  .gsr-item-header .total {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-weight: 500;
  }
  .gsr-locations {
    padding: 4px 0;
  }
  .gsr-location {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px 6px 48px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: background 0.1s;
  }
  .gsr-location:hover, .gsr-location.kbd-active {
    background: var(--accent-bg);
  }
  .gsr-location .account-name {
    flex: 1;
    color: var(--text);
  }
  .gsr-location .server-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .gsr-location .qty {
    font-weight: 700;
    color: var(--text-title);
    min-width: 32px;
    text-align: right;
  }
  /* Accounts list: now a vertical column in the sidebar */
  .accounts-list, .accounts-bar {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: stretch;
  }
  .account-tab {
    padding: 6px 10px;
    border: 1px solid transparent;
    background: transparent;
    border-radius: var(--radius);
    font-size: 13px; cursor: pointer; color: var(--text);
    font-family: inherit;
    font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.12s;
    text-align: left;
    width: 100%;
  }
  .account-tab > span:first-child {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .account-tab:hover {
    background: var(--surface-2);
    border-color: var(--border);
  }
  .account-tab.active {
    background: var(--accent);
    color: var(--surface);
    border-color: var(--accent-strong);
    font-weight: 600;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
  }
  .account-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 8px; font-size: 10px; font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
  }
  .account-badge.today { background: var(--warning); color: #fff; }
  .account-badge.overdue { background: var(--danger); color: #fff; }
  .account-badge.goal { background: var(--success); color: #fff; padding: 0; min-width: 16px; }
  .account-badge.goal.almost { background: var(--warning); color: #fff; }
  .account-tab.active .account-badge.today,
  .account-tab.active .account-badge.overdue,
  .account-tab.active .account-badge.goal { box-shadow: 0 0 0 1.5px var(--surface); }
  .add-account-btn {
    padding: 6px 10px;
    border: 1px dashed var(--border-strong);
    background: transparent;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
    margin-top: 4px;
    text-align: left;
  }
  .add-account-btn:hover {
    background: var(--surface-2);
    color: var(--text-title);
    border-color: var(--text-title);
  }
  /* Server bar — now compact "pills" inline with the view tabs */
  .server-bar {
    display: flex; gap: 4px; flex-wrap: nowrap;
    align-items: center;
    margin: 0;
  }
  .server-bar-label {
    font-size: 10px; color: var(--text-muted); margin-right: 4px;
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600;
  }
  .server-tab {
    padding: 3px 10px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    font-weight: 600;
    display: inline-flex; align-items: center; gap: 4px;
    transition: all 0.15s;
  }
  .server-tab:hover { background: var(--surface-2); color: var(--text); }
  .server-tab.active {
    background: var(--text-title);
    color: var(--surface);
    border-color: var(--text-title);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
  }
  .server-tab.active .account-badge.today,
  .server-tab.active .account-badge.overdue,
  .server-tab.active .account-badge.goal { box-shadow: 0 0 0 1.5px var(--text-title); }
  .view-tabs {
    display: flex; gap: 2px;
    margin: 0 0 0 auto;
    flex-wrap: nowrap;
    flex-shrink: 0;
  }
  .view-tab {
    padding: 6px 14px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    font-family: inherit;
    border-radius: var(--radius);
    font-weight: 600;
    transition: all 0.15s;
  }
  .view-tab:hover { color: var(--text); background: var(--surface-2); }
  .view-tab.active {
    color: var(--surface);
    background: var(--text-title);
    border-color: var(--text-title);
    font-weight: 700;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-soft);
    position: relative;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 12px; right: 12px;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--gold) 20%,
      var(--gold) 80%,
      transparent 100%);
    opacity: 0.6;
    border-radius: 1px;
  }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; gap: 10px; flex-wrap: wrap;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 17px; font-weight: 700; margin: 0;
    color: var(--text-title);
    font-family: var(--font-display);
    letter-spacing: 0.02em;
  }
  .panel-subtitle {
    font-size: 12px; color: var(--text-muted); margin-left: 8px;
    text-transform: uppercase; letter-spacing: 0.08em;
    font-family: var(--font-title);
    font-weight: 400;
  }
  .panel-actions { display: flex; gap: 8px; }
  .btn {
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 7px 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
    font-weight: 600;
    transition: all 0.15s;
    box-shadow: var(--shadow-soft);
  }
  .btn:hover {
    background: var(--surface-3);
    color: var(--text-title);
    transform: translateY(-1px);
    box-shadow: var(--shadow-strong);
  }
  .btn:active { transform: translateY(0); box-shadow: var(--shadow-soft); }
  .btn.primary {
    background: var(--accent);
    color: var(--surface);
    border-color: var(--accent-strong);
  }
  .btn.primary:hover { background: var(--accent-strong); color: var(--surface); }
  .btn.success {
    background: var(--success);
    color: var(--surface);
    border-color: var(--success);
  }
  .btn.success:hover { background: var(--success); filter: brightness(0.9); }
  .btn.danger:hover {
    background: var(--danger);
    color: var(--surface);
    border-color: var(--danger);
  }
  .add-task-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .add-task-row input[type="text"] { flex: 1 1 200px; min-width: 0; }
  .add-task-row input[type="date"] { width: 150px; }
  .add-task-row select { width: 140px; }
  input, select {
    padding: 8px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    height: 36px;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .stat-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    box-shadow: var(--shadow-soft);
  }
  .stat-label {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .stat-value {
    font-size: 19px; font-weight: 700;
    color: var(--text-title);
    font-family: var(--font-title);
    line-height: 1.2;
  }
  .reminders-section {
    background: var(--warning-bg);
    border: 1px solid var(--warning);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 1rem;
    box-shadow: var(--shadow-soft);
  }
  .reminders-title {
    font-size: 14px; font-weight: 700;
    color: var(--warning); margin: 0 0 8px;
    font-family: var(--font-title);
  }
  .reminder-item { font-size: 13px; color: var(--warning); padding: 3px 0; }
  .filter-bar { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; font-size: 13px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 12px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    border-radius: var(--radius);
    cursor: pointer; font-size: 12px;
    color: var(--text-muted); font-family: inherit;
    font-weight: 600;
  }
  .filter-btn.active {
    background: var(--accent);
    color: var(--surface);
    border-color: var(--accent-strong);
  }
  .task-list { list-style: none; padding: 0; margin: 0; }
  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-item input[type="checkbox"] {
    width: 18px; height: 18px;
    cursor: pointer; flex-shrink: 0;
    accent-color: var(--accent-strong);
  }

<script>
  // Restore saved theme before rendering to avoid a flash of unstyled content
  (function() {
    try {
      const saved = localStorage.getItem('equideow-theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        // No saved preference: use system preference
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  })();
</script>

  // ============================================================
  // DATA SHAPE (v5):
  //
  // state = {
  //   accounts: [
  //     {
  //       id, name,
  //       servers: {
  //         gaia:    { tasks, quantities, buses, exchanges },
  //         ouranos: { tasks, quantities, buses, exchanges }
  //       }
  //     }
  //   ],
  //   itemCatalog: [{id, name, category, slug?}],   // global, shared
  //   activeAccountId, activeServer, currentView
  // }
  // ============================================================

  let state = {
    accounts: [],
    itemCatalog: [],
    activeAccountId: null,
    activeServer: 'gaia',
    currentView: 'tasks',
    updatedAt: null   // ISO global : horodatage de la dernière modif (pour comparer au cloud)
  };
  let meta = { changesSinceBackup: 0, lastBackupAt: null };
  let currentFilter = 'all';
  let inventoryFilter = 'all';        // 'all' | 'inStock' | 'outOfStock' | category id
  let inventorySortSnapshot = null;
  let snapshotForKey = null;  // now keyed by accountId + server

  // ============================================================
  // FACTORIES & HELPERS
  // ============================================================
  function isFreeInputItem(name) {
    return FREE_INPUT_ITEM_NAMES.includes(name.toLowerCase());
  }

  // Whether an item should count toward the "Total d'objets" stat.
  // We exclude:
  //   - Compagnons (they're entities, not stockable items)
  //   - Point de vieillissement (cumulative resource that would dwarf everything)
  function itemCountsInTotal(item) {
    if (!item) return false;
    if (item.category === 'compagnons') return false;
    if (isFreeInputItem(item.name)) return false;
    return true;
  }

  function makeDefaultCatalog() {
    return DEFAULT_ITEMS.map((item, i) => ({
      id: 'item_' + i,
      name: item.name,
      category: item.category,
      slug: item.slug
    }));
  }

  function makeDefaultBuses() {
    return { repro: 0, stockF: 0, stockM: 0 };
  }

  function makeDefaultExchanges() {
    return { count: 0, lastResetWeekKey: getCurrentWeekKey() };
  }

  function makeDefaultServerData() {
    return {
      tasks: [],
      quantities: {},
      buses: makeDefaultBuses(),
      exchanges: makeDefaultExchanges(),
      busesGoalReached: false,
      inventoryUpdatedAt: null  // ISO timestamp of last inventory change
    };
  }

  function makeDefaultAccount(name) {
    return {
      id: 'a' + Date.now() + Math.random().toString(36).slice(2, 5),
      name: name,
      servers: {
        gaia: makeDefaultServerData(),
        ouranos: makeDefaultServerData()
      }
    };
  }

  function getCurrentWeekKey() {
    const now = new Date();
    const day = now.getDay();
    const daysSinceMonday = (day === 0) ? 6 : day - 1;
    const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysSinceMonday);
    return monday.getFullYear() + '-' +
      String(monday.getMonth() + 1).padStart(2, '0') + '-' +
      String(monday.getDate()).padStart(2, '0');
  }

  function getNextMondayDate() {
    const now = new Date();
    const day = now.getDay();
    const daysUntilNextMonday = (day === 0) ? 1 : (8 - day);
    return new Date(now.getFullYear(), now.getMonth(), now.getDate() + daysUntilNextMonday);
  }

  function formatResetInfo() {
    const next = getNextMondayDate();
    const now = new Date();
    const diffMs = next - now;
    const diffH = Math.floor(diffMs / (1000 * 60 * 60));
    const diffD = Math.floor(diffH / 24);
    return diffD >= 1 ? `Reset dans ${diffD}j` : `Reset dans ${diffH}h`;
  }

  function uid(prefix) { return (prefix || 't') + Date.now() + Math.random().toString(36).slice(2, 7); }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDate(s) {
    const [y,m,d] = s.split('-');
    return d + '/' + m;
  }

  function getDateBadge(dateStr) {
    if (!dateStr) return null;
    const today = todayStr();
    if (dateStr < today) return { cls: 'overdue', label: 'En retard - ' + formatDate(dateStr) };
    if (dateStr === today) return { cls: 'today', label: "Aujourd'hui" };
    return { cls: '', label: formatDate(dateStr) };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ============================================================
  // ACTIVE-DATA SHORTCUTS
  // ============================================================
  function isAllAccountsView() {
    return state.activeAccountId === ALL_ACCOUNTS_ID;
  }

  function getActiveAccount() {
    return state.accounts.find(a => a.id === state.activeAccountId);
  }

  function getActiveServerData() {
    const acc = getActiveAccount();
    if (!acc) return null;
    return acc.servers[state.activeServer];
  }

  function getQty(serverData, itemId) {
    return serverData.quantities[itemId] || 0;
  }

  // Marks the given (compte, serveur) inventory as updated now.
  // Call this whenever quantities are written (+/-, free-input, catalog add,
  // catalog remove, import). Doesn't save by itself — the caller usually
  // already does saveState() or recordChange().
  function markInventoryUpdated(serverData) {
    if (!serverData) return;
    serverData.inventoryUpdatedAt = new Date().toISOString();
  }

  // Formats an inventory-updated timestamp in a friendly French way:
  //   - very recent → "à l'instant"
  //   - < 1h        → "il y a 5 min"
  //   - same day    → "aujourd'hui à 14:32"
  //   - yesterday   → "hier à 09:15"
  //   - older       → "le 12/05 à 18:40"
  function formatInventoryUpdated(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return null;
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return "à l'instant";
    if (diffMin < 60) return 'il y a ' + diffMin + ' min';

    const sameDay = d.toDateString() === now.toDateString();
    const yesterday = new Date(now.getTime() - 86400000);
    const isYesterday = d.toDateString() === yesterday.toDateString();
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    if (sameDay) return "aujourd'hui à " + hh + ':' + mm;
    if (isYesterday) return 'hier à ' + hh + ':' + mm;
    const dd = String(d.getDate()).padStart(2, '0');
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    return 'le ' + dd + '/' + mo + ' à ' + hh + ':' + mm;
  }

  // Returns aggregated quantity of an item on the active server, summed
  // across all real accounts. Used by the "Tous les comptes" view.
  function getAggregatedQty(itemId) {
    let total = 0;
    state.accounts.forEach(a => {
      total += getQty(a.servers[state.activeServer], itemId);
    });
    return total;
  }

  // ============================================================
  // MIGRATION
  // ============================================================
  // Detects a server suffix/prefix in a name like "Lison Gaïa", "Ouranos -
  // Lison", "Pip Gaia", "G - Lison", etc. Returns { baseName, server } or null.
  function detectServerInName(name) {
    if (!name) return null;
    const trimmed = name.trim();
    // We support several spellings:
    //   - Full names: Gaïa, Gaia, Ouranos
    //   - Single-letter abbreviations: G, O — but ONLY when surrounded by
    //     explicit separators (space, dash, slash, etc.) at the end or start,
    //     so we don't accidentally match real names starting with G or O.
    const SEP = '[\\s\\-_/|·:]+';
    const patterns = [
      // Full names at the end / start
      { server: 'gaia',    re: new RegExp('(.*?)' + SEP + '(?:ga[ïi]a|gaia)\\s*$', 'i') },
      { server: 'gaia',    re: new RegExp('^(?:ga[ïi]a|gaia)' + SEP + '(.+)$', 'i') },
      { server: 'ouranos', re: new RegExp('(.*?)' + SEP + 'ouranos\\s*$', 'i') },
      { server: 'ouranos', re: new RegExp('^ouranos' + SEP + '(.+)$', 'i') },
      // Short abbreviations at the end / start (single letter only)
      { server: 'gaia',    re: new RegExp('(.*?)' + SEP + 'g\\s*$', 'i') },
      { server: 'gaia',    re: new RegExp('^g' + SEP + '(.+)$', 'i') },
      { server: 'ouranos', re: new RegExp('(.*?)' + SEP + 'o\\s*$', 'i') },
      { server: 'ouranos', re: new RegExp('^o' + SEP + '(.+)$', 'i') }
    ];
    for (const p of patterns) {
      const m = trimmed.match(p.re);
      if (m && m[1] && m[1].trim()) {
        return { baseName: m[1].trim(), server: p.server };
      }
    }
    // Bare server names → no real base name
    if (/^(?:ga[ïi]a|gaia)$/i.test(trimmed)) {
      return { baseName: trimmed, server: 'gaia', bare: true };
    }
    if (/^ouranos$/i.test(trimmed)) {
      return { baseName: trimmed, server: 'ouranos', bare: true };
    }
    return null;
  }

  // Convert a v1-v4 account to v5 server-data shape (using its existing fields
  // as data for ONE specific server)
  function accountToServerData(oldAcc) {
    return {
      tasks: oldAcc.tasks || [],
      quantities: oldAcc.quantities || {},
      buses: oldAcc.buses || makeDefaultBuses(),
      exchanges: oldAcc.exchanges || makeDefaultExchanges()
    };
  }

  function migrateOldData(oldData) {
    if (!oldData.accounts) return null;

    // First pass: rebuild the catalog (we may need to add missing items)
    let catalog = makeDefaultCatalog();
    let nameToId = new Map();
    catalog.forEach(c => nameToId.set(c.name.toLowerCase(), c.id));

    const oldIdToName = new Map();
    if (oldData.itemCatalog) {
      oldData.itemCatalog.forEach(item => {
        oldIdToName.set(item.id, item.name);
        if (!nameToId.has(item.name.toLowerCase())) {
          const newId = 'item_extra_' + catalog.length;
          catalog.push({ id: newId, name: item.name, category: 'autres', slug: item.slug });
          nameToId.set(item.name.toLowerCase(), newId);
        } else if (item.slug) {
          // Attach slug to a pre-filled catalog item if we know it
          const existingId = nameToId.get(item.name.toLowerCase());
          const existing = catalog.find(c => c.id === existingId);
          if (existing && !existing.slug) existing.slug = item.slug;
        }
      });
    }

    // Helper: rebuild quantities map using the new catalog ids
    function migrateQuantities(oldQuantities, oldInventory) {
      const out = {};
      if (oldQuantities) {
        Object.entries(oldQuantities).forEach(([oldId, qty]) => {
          const itemName = oldIdToName.get(oldId);
          if (itemName) {
            const newId = nameToId.get(itemName.toLowerCase());
            if (newId && qty > 0) out[newId] = qty;
          }
        });
      } else if (oldInventory && Array.isArray(oldInventory)) {
        oldInventory.forEach(item => {
          if ((item.qty || 0) > 0) {
            let newId = nameToId.get(item.name.toLowerCase());
            if (!newId) {
              newId = 'item_extra_' + catalog.length;
              catalog.push({ id: newId, name: item.name, category: item.category || 'autres' });
              nameToId.set(item.name.toLowerCase(), newId);
            }
            out[newId] = item.qty;
          }
        });
      }
      return out;
    }

    // Second pass: detect server suffix/prefix on each account name
    // and group accounts that share the same base name.
    const oldAccounts = oldData.accounts;
    const groupedByBase = new Map(); // baseName lower → { gaia?: oldAcc, ouranos?: oldAcc, originalNames: [] }
    const unassigned = []; // Accounts with no detectable server

    oldAccounts.forEach(oldAcc => {
      const detected = detectServerInName(oldAcc.name);
      if (!detected) {
        unassigned.push(oldAcc);
        return;
      }
      const key = detected.bare ? detected.baseName.toLowerCase() : detected.baseName.toLowerCase();
      if (!groupedByBase.has(key)) {
        groupedByBase.set(key, {
          baseName: detected.baseName,
          bare: detected.bare,
          gaia: null,
          ouranos: null,
          originalNames: []
        });
      }
      const group = groupedByBase.get(key);
      group.originalNames.push(oldAcc.name);
      if (!group[detected.server]) {
        group[detected.server] = oldAcc;
      } else {
        // Conflict: two accounts with same server tag — keep them separate
        unassigned.push(oldAcc);
      }
    });

    const newAccounts = [];

    // Build merged accounts from groups
    groupedByBase.forEach(group => {
      // If both server slots are filled, merge them under the base name
      // If only one is filled and it's a "bare" name (just "Gaïa" or "Ouranos"),
      //   keep it as its own account named after the server
      // If only one is filled and the base name is real, the other server stays empty
      const accountName = group.bare
        ? SERVER_LABELS[group.gaia ? 'gaia' : 'ouranos']
        : group.baseName;

      const newAcc = makeDefaultAccount(accountName);
      if (group.gaia) {
        const sd = accountToServerData(group.gaia);
        sd.quantities = migrateQuantities(group.gaia.quantities, group.gaia.inventory);
        newAcc.servers.gaia = sd;
        // Preserve the original ID if there's only one server, useful for activeAccountId
        if (!group.ouranos) newAcc.id = group.gaia.id;
      }
      if (group.ouranos) {
        const sd = accountToServerData(group.ouranos);
        sd.quantities = migrateQuantities(group.ouranos.quantities, group.ouranos.inventory);
        newAcc.servers.ouranos = sd;
        if (!group.gaia) newAcc.id = group.ouranos.id;
      }
      newAccounts.push(newAcc);
    });

    // Build unassigned accounts as-is (data goes to Gaïa server by default)
    unassigned.forEach(oldAcc => {
      const newAcc = makeDefaultAccount(oldAcc.name);
      newAcc.id = oldAcc.id;
      const sd = accountToServerData(oldAcc);
      sd.quantities = migrateQuantities(oldAcc.quantities, oldAcc.inventory);
      newAcc.servers.gaia = sd;
      newAccounts.push(newAcc);
    });

    // Pick the active account: try to preserve the previously active one
    let activeAccountId = newAccounts[0]?.id || null;
    let activeServer = 'gaia';
    if (oldData.activeId) {
      const found = newAccounts.find(a => a.id === oldData.activeId);
      if (found) activeAccountId = found.id;
      // Also detect server from original name if possible
      const oldActive = oldAccounts.find(a => a.id === oldData.activeId);
      if (oldActive) {
        const detected = detectServerInName(oldActive.name);
        if (detected) {
          // Find the new account that contains this server's data
          const owner = newAccounts.find(a =>
            (a.servers.gaia === accountToServerData(oldActive) ||
             a.servers.ouranos === accountToServerData(oldActive))
          );
          if (owner) {
            activeAccountId = owner.id;
            activeServer = detected.server;
          }
        }
      }
    }

    return {
      accounts: newAccounts,
      itemCatalog: catalog,
      activeAccountId: activeAccountId,
      activeServer: activeServer,
      currentView: oldData.currentView || 'tasks'
    };
  }

  // ============================================================
  // PERSISTENCE
  // ============================================================
  // ============================================================
  // CLOUD SYNC — lecture du Gist + application sécurisée
  // ============================================================

  function isCloudViewer() {
    try { return localStorage.getItem(CLOUD_VIEWER_KEY) === '1'; } catch (e) { return false; }
  }
  function setCloudViewer(on) {
    try { localStorage.setItem(CLOUD_VIEWER_KEY, on ? '1' : '0'); } catch (e) {}
  }

  // Un état contient-il des données réelles (vs compte par défaut vide) ?
  function stateHasContent(s) {
    if (!s || !Array.isArray(s.accounts)) return false;
    return s.accounts.some(a => a.servers && SERVERS.some(sv => {
      const sd = a.servers[sv];
      if (!sd) return false;
      return (sd.tasks && sd.tasks.length) ||
             (sd.quantities && Object.keys(sd.quantities).length) ||
             (sd.buses && (sd.buses.repro || sd.buses.stockF || sd.buses.stockM));
    }));
  }

  // Remet en forme un état importé (du cloud) : remplit les champs manquants.
  function normalizeImported(obj) {
    const imported = obj;
    if (!imported.itemCatalog || imported.itemCatalog.length === 0) {
      imported.itemCatalog = makeDefaultCatalog();
    }
    imported.accounts.forEach(acc => {
      if (!acc.servers) acc.servers = {};
      SERVERS.forEach(s => {
        if (!acc.servers[s]) acc.servers[s] = makeDefaultServerData();
        const sd = acc.servers[s];
        if (!sd.tasks) sd.tasks = [];
        if (!sd.quantities) sd.quantities = {};
        if (!sd.buses) sd.buses = makeDefaultBuses();
        if (!sd.exchanges) sd.exchanges = makeDefaultExchanges();
        if (typeof sd.busesGoalReached !== 'boolean') sd.busesGoalReached = false;
        if (!('inventoryUpdatedAt' in sd)) sd.inventoryUpdatedAt = null;
      });
    });
    if (!imported.currentView) imported.currentView = 'tasks';
    if (!imported.activeServer || !SERVERS.includes(imported.activeServer)) imported.activeServer = 'gaia';
    const validActive = imported.activeAccountId === ALL_ACCOUNTS_ID ||
      (imported.activeAccountId && imported.accounts.find(a => a.id === imported.activeAccountId));
    if (!validActive) imported.activeAccountId = imported.accounts[0]?.id || null;
    if (imported.activeAccountId === ALL_ACCOUNTS_ID && imported.accounts.length < 2) {
      imported.activeAccountId = imported.accounts[0]?.id || null;
    }
    return imported;
  }

  // Récupère le contenu du Gist. Renvoie l'objet état, ou null si vide.
  async function fetchCloud() {
    const res = await fetch(CLOUD.api, {
      headers: { 'Accept': 'application/vnd.github+json' },
      cache: 'no-store'
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const gist = await res.json();
    const file = gist.files && gist.files[CLOUD.file];
    if (!file) throw new Error('Fichier ' + CLOUD.file + ' absent du Gist');
    let content = file.content;
    if (file.truncated && file.raw_url) {
      const r2 = await fetch(file.raw_url, { cache: 'no-store' });
      content = await r2.text();
    }
    content = (content || '').trim();
    if (!content || content === '{}') return null;
    const parsed = JSON.parse(content);
    if (!parsed || !Array.isArray(parsed.accounts)) return null;
    return parsed;
  }

  // Relation entre le cloud et l'état local : 'newer' | 'older' | 'equal' | 'unknown' | 'none'
  function cloudRelation(cloud) {
    if (!cloud || !Array.isArray(cloud.accounts) || cloud.accounts.length === 0) return 'none';
    if (!stateHasContent(state)) return 'newer';   // local vide (ex. téléphone) → le cloud gagne
    const cu = cloud.updatedAt ? Date.parse(cloud.updatedAt) : NaN;
    const lu = state.updatedAt ? Date.parse(state.updatedAt) : NaN;
    if (!isNaN(cu) && !isNaN(lu)) {
      if (cu > lu) return 'newer';
      if (cu < lu) return 'older';
      return 'equal';
    }
    if (!isNaN(cu) && isNaN(lu)) return 'newer';
    return 'unknown';   // les deux ont du contenu mais pas d'horodatage fiable → décision manuelle
  }

  function applyCloud(cloud) {
    if (!cloud || !Array.isArray(cloud.accounts)) return false;
    state = normalizeImported(cloud);
    saveState();
    render();
    return true;
  }

  function setCloudStatus(text, cls, action) {
    const el = document.getElementById('cloudStatus');
    if (!el) return;
    el.textContent = '☁';
    el.className = 'status-icon ' + (cls || 'off');
    el.title = 'Cloud : ' + String(text || '').replace(/^☁\s*/, '');
    el.dataset.action = action || '';
  }

  function relativeFromIso(iso) {
    if (!iso) return '';
    const t = Date.parse(iso);
    if (isNaN(t)) return '';
    const mins = Math.floor((Date.now() - t) / 60000);
    if (mins < 1) return "à l'instant";
    if (mins < 60) return 'il y a ' + mins + ' min';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return 'il y a ' + hrs + ' h';
    const days = Math.floor(hrs / 24);
    return 'il y a ' + days + ' j';
  }

  // mode : 'auto' (au chargement / focus) ou 'manual' (bouton ↻)
  async function syncFromCloud(mode) {
    const btn = document.getElementById('cloudSyncBtn');
    if (btn) btn.classList.add('spinning');
    setCloudStatus('☁ …', 'off');
    try {
      const cloud = await fetchCloud();
      lastCloud = cloud;
      lastCloudFetchAt = Date.now();
      const rel = cloudRelation(cloud);

      if (rel === 'none') {
        setCloudStatus('☁ Cloud vide', 'off');
        if (mode === 'manual') alert('Le Gist est encore vide. Colle des données dedans (ou attends la synchro auto depuis le PC) pour les voir ici.');
        return;
      }

      const when = relativeFromIso(cloud.updatedAt);

      if (rel === 'newer') {
        if (isCloudViewer() || mode === 'manual') {
          // Appareil afficheur, ou clic manuel : on applique (avec garde-fou si on écrase des données locales)
          if (mode === 'manual' && stateHasContent(state) &&
              !confirm('Charger les données du cloud sur cet appareil ? Tes données locales seront remplacées.')) {
            setCloudStatus('☁ Cloud plus récent · charger', 'new', 'load');
            return;
          }
          applyCloud(cloud);
          setCloudStatus('☁ À jour' + (when ? ' · ' + when : ''), 'ok');
        } else {
          // Appareil éditeur (PC) : on n'écrase jamais en silence, on propose
          setCloudStatus('☁ Cloud plus récent' + (when ? ' (' + when + ')' : '') + ' · charger', 'new', 'load');
        }
      } else if (rel === 'unknown') {
        if (mode === 'manual' &&
            confirm('Le cloud diffère de tes données locales mais aucun horodatage ne permet de trancher. Charger le cloud (remplace le local) ?')) {
          applyCloud(cloud);
          setCloudStatus('☁ Chargé depuis le cloud', 'ok');
        } else {
          setCloudStatus('☁ Cloud différent · charger ?', 'new', 'load');
        }
      } else {
        // older / equal
        setCloudStatus('☁ Local à jour', 'ok');
        if (mode === 'manual') alert('Le cloud n\'est pas plus récent que tes données locales — rien à charger.');
      }
    } catch (err) {
      setCloudStatus('☁ Hors ligne', 'off');
      if (mode === 'manual') alert('Cloud injoignable : ' + err.message);
    } finally {
      if (btn) btn.classList.remove('spinning');
    }
  }

  function onCloudStatusClick() {
    const el = document.getElementById('cloudStatus');
    if (!el || el.dataset.action !== 'load' || !lastCloud) return;
    if (!stateHasContent(state) ||
        confirm('Charger les données du cloud sur cet appareil ? Tes données locales seront remplacées.')) {
      applyCloud(lastCloud);
      setCloudStatus('☁ À jour' + (lastCloud.updatedAt ? ' · ' + relativeFromIso(lastCloud.updatedAt) : ''), 'ok');
    }
  }

  function load() {
    let loaded = false;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { state = JSON.parse(raw); loaded = true; }
    } catch (e) {}

    // If we already have v5 data, but old data is still hanging around,
    // we offer to redo the migration once. This handles the case where the
    // first migration ran with imperfect detection rules and the user wants
    // a second try with improved detection.
    let canRemigrate = false;
    if (loaded) {
      for (const oldKey of OLD_KEYS) {
        if (localStorage.getItem(oldKey)) {
          canRemigrate = true;
          break;
        }
      }
    }
    // Expose a redo function on the window for the prompt button
    window.__equideowRedoMigration = function () {
      for (const oldKey of OLD_KEYS) {
        try {
          const raw = localStorage.getItem(oldKey);
          if (raw) {
            const oldData = JSON.parse(raw);
            const migrated = migrateOldData(oldData);
            if (migrated) {
              state = migrated;
              saveState();
              render();
              alert('✓ Migration relancée. Vérifie tes comptes !');
              return;
            }
          }
        } catch (e) {}
      }
      alert('Aucune donnée ancienne trouvée à migrer.');
    };

    if (!loaded) {
      for (const oldKey of OLD_KEYS) {
        try {
          const raw = localStorage.getItem(oldKey);
          if (raw) {
            const oldData = JSON.parse(raw);
            const migrated = migrateOldData(oldData);
            if (migrated) {
              state = migrated;
              saveState();
              loaded = true;
              break;
            }
          }
        } catch (e) {}
      }
    }

    try {
      const rawMeta = localStorage.getItem(META_KEY);
      if (rawMeta) meta = JSON.parse(rawMeta);
    } catch (e) {}

    if (!state.accounts || state.accounts.length === 0) {
      const initial = makeDefaultAccount('Mon compte');
      state = {
        accounts: [initial],
        itemCatalog: makeDefaultCatalog(),
        activeAccountId: initial.id,
        activeServer: 'gaia',
        currentView: 'tasks'
      };
      saveState();
    }

    // Ensure all required fields exist
    if (!state.itemCatalog || state.itemCatalog.length === 0) {
      state.itemCatalog = makeDefaultCatalog();
    }
    state.accounts.forEach(acc => {
      if (!acc.servers) acc.servers = {};
      SERVERS.forEach(s => {
        if (!acc.servers[s]) acc.servers[s] = makeDefaultServerData();
        const sd = acc.servers[s];
        if (!sd.tasks) sd.tasks = [];
        if (!sd.quantities) sd.quantities = {};
        if (!sd.buses) sd.buses = makeDefaultBuses();
        if (!sd.exchanges) sd.exchanges = makeDefaultExchanges();
        if (typeof sd.busesGoalReached !== 'boolean') sd.busesGoalReached = false;
        if (!('inventoryUpdatedAt' in sd)) sd.inventoryUpdatedAt = null;
      });
    });
    if (!state.currentView) state.currentView = 'tasks';
    if (!state.activeServer || !SERVERS.includes(state.activeServer)) state.activeServer = 'gaia';
    // activeAccountId can be the special ALL_ACCOUNTS_ID for the aggregated view
    const isValidActive = state.activeAccountId === ALL_ACCOUNTS_ID ||
      (state.activeAccountId && state.accounts.find(a => a.id === state.activeAccountId));
    if (!isValidActive) {
      state.activeAccountId = state.accounts[0]?.id || null;
    }
    // Drop the aggregated view if we have less than 2 accounts (it wouldn't render)
    if (state.activeAccountId === ALL_ACCOUNTS_ID && state.accounts.length < 2) {
      state.activeAccountId = state.accounts[0]?.id || null;
    }

    processWeeklyResets();
    saveState();
    render();
    setTimeout(checkBackupReminder, 500);

    // If we already had v5 data but old data is still around, offer a re-migration
    if (canRemigrate) {
      showRemigrationBanner();
    }

    // Lecture du cloud (asynchrone, ne bloque pas l'affichage local)
    document.getElementById('cloudViewerToggle').checked = isCloudViewer();
    syncFromCloud('auto');
  }

  function showRemigrationBanner() {
    // Avoid stacking multiple banners
    if (document.getElementById('remigrationBanner')) return;
    const mainContent = document.querySelector('.main-content');
    if (!mainContent) return;
    const banner = document.createElement('div');
    banner.id = 'remigrationBanner';
    banner.style.cssText = `
      background: var(--warning-bg); color: var(--warning);
      padding: 12px 16px; border-radius: var(--radius);
      margin-bottom: 1rem; font-size: 13px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      border: 1px solid var(--warning);
    `;
    banner.innerHTML = `
      <span>🔄 D'anciennes données sont encore disponibles. Si la migration de tes comptes ne s'est pas bien faite, tu peux la relancer.</span>
      <div style="display: flex; gap: 8px;">
        <button class="btn" id="remigrateBtn">Relancer la migration</button>
        <button class="btn" id="dismissMigrationBtn">Ignorer</button>
      </div>
    `;
    // Insert at the top of main-content
    mainContent.insertBefore(banner, mainContent.firstChild);

    document.getElementById('remigrateBtn').onclick = () => {
      if (confirm('Cela va remplacer tes données actuelles par une nouvelle migration depuis l\'ancienne version. Continuer ?')) {
        window.__equideowRedoMigration();
        banner.remove();
      }
    };
    document.getElementById('dismissMigrationBtn').onclick = () => {
      // Mark as dismissed so it doesn't reappear on every load
      try { localStorage.setItem('equideow-migration-dismissed', '1'); } catch (e) {}
      banner.remove();
    };

    // Don't show if previously dismissed
    try {
      if (localStorage.getItem('equideow-migration-dismissed') === '1') {
        banner.remove();
      }
    } catch (e) {}
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (e) { console.error('Save error:', e); }
  }

  function saveMeta() {
    try { localStorage.setItem(META_KEY, JSON.stringify(meta)); }
    catch (e) {}
  }

  function recordChange() {
    state.updatedAt = new Date().toISOString();  // marque cet appareil comme « éditeur récent »
    saveState();
    meta.changesSinceBackup = (meta.changesSinceBackup || 0) + 1;
    saveMeta();
    renderBackupStatus();
    if (meta.changesSinceBackup >= CHANGES_BEFORE_BACKUP &&
        meta.changesSinceBackup % CHANGES_BEFORE_BACKUP === 0 &&
        !isBackupSnoozed()) {
      promptBackup('count');
    }
  }

  function daysSinceBackup() {
    if (!meta.lastBackupAt) return null;
    const diff = Date.now() - new Date(meta.lastBackupAt).getTime();
    return Math.floor(diff / (1000*60*60*24));
  }

  // Returns true if the user asked to be left alone about backups until later
  function isBackupSnoozed() {
    if (!meta.snoozeUntil) return false;
    const snoozeDate = new Date(meta.snoozeUntil);
    if (isNaN(snoozeDate.getTime())) return false;
    return Date.now() < snoozeDate.getTime();
  }

  function snoozeBackupUntilTomorrow() {
    // Snooze until tomorrow at 4am local time — that way "tomorrow morning"
    // you get the reminder back, even if you're using the app very late at night.
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(4, 0, 0, 0);
    meta.snoozeUntil = tomorrow.toISOString();
    saveMeta();
    renderBackupStatus();
  }

  function checkBackupReminder() {
    if (isBackupSnoozed()) return;
    const days = daysSinceBackup();
    if (days === null && meta.changesSinceBackup > 0) {
      promptBackup('never');
    } else if (days !== null && days >= DAYS_BEFORE_BACKUP_REMINDER && meta.changesSinceBackup > 0) {
      promptBackup('time', days);
    }
  }

  function promptBackup(reason, days) {
    let title, message;
    if (reason === 'count') {
      title = '💾 C\'est le moment de sauvegarder';
      message = `Tu as fait ${meta.changesSinceBackup} modifications depuis ta dernière sauvegarde. Télécharger une sauvegarde maintenant ?`;
    } else if (reason === 'never') {
      title = '💾 Première sauvegarde';
      message = 'Tu n\'as encore jamais sauvegardé tes données. Si tu vides le cache de ton navigateur, tu perdras tout. On en télécharge une maintenant ?';
    } else {
      title = '💾 Sauvegarde recommandée';
      message = `Ta dernière sauvegarde date d'il y a ${days} jours. On en fait une nouvelle ?`;
    }
    showCustomModal(title, message, [
      { label: 'Plus tard', cls: '', action: () => { renderBackupStatus(); }},
      { label: 'Pas avant demain', cls: '', action: () => { snoozeBackupUntilTomorrow(); }},
      { label: '💾 Sauvegarder', cls: 'success', action: () => exportData() }
    ]);
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'equideow-tasks-' + todayStr() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    meta.lastBackupAt = new Date().toISOString();
    meta.changesSinceBackup = 0;
    saveMeta();
    renderBackupStatus();
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.accounts || !Array.isArray(data.accounts)) {
          alert('Fichier invalide.');
          return;
        }
        if (!confirm('Cela va remplacer tes données actuelles. Continuer ?')) return;

        let imported = data;
        // Detect old format (no .servers on accounts) and migrate
        const isOldFormat = data.accounts.some(a => !a.servers);
        if (isOldFormat) {
          const migrated = migrateOldData(data);
          if (migrated) imported = migrated;
        }

        // Sanity-fill missing fields
        if (!imported.itemCatalog || imported.itemCatalog.length === 0) {
          imported.itemCatalog = makeDefaultCatalog();
        }
        imported.accounts.forEach(acc => {
          if (!acc.servers) acc.servers = {};
          SERVERS.forEach(s => {
            if (!acc.servers[s]) acc.servers[s] = makeDefaultServerData();
            const sd = acc.servers[s];
            if (!sd.tasks) sd.tasks = [];
            if (!sd.quantities) sd.quantities = {};
            if (!sd.buses) sd.buses = makeDefaultBuses();
            if (!sd.exchanges) sd.exchanges = makeDefaultExchanges();
            if (typeof sd.busesGoalReached !== 'boolean') sd.busesGoalReached = false;
        if (!('inventoryUpdatedAt' in sd)) sd.inventoryUpdatedAt = null;
          });
        });
        if (!imported.currentView) imported.currentView = 'tasks';
        if (!imported.activeServer) imported.activeServer = 'gaia';
        if (!imported.activeAccountId) imported.activeAccountId = imported.accounts[0]?.id || null;

        state = imported;
        saveState();
        meta.lastBackupAt = new Date().toISOString();
        meta.changesSinceBackup = 0;
        saveMeta();
        render();
      } catch (err) {
        alert('Erreur de lecture du fichier : ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  // ============================================================
  // RECURRING TASK PROCESSING
  // ============================================================
  function processRecurring() {
    const today = todayStr();
    let changed = false;
    state.accounts.forEach(acc => {
      SERVERS.forEach(s => {
        acc.servers[s].tasks.forEach(t => {
          if (t.recurring === 'daily' && t.done && t.completedAt !== today) {
            t.done = false; changed = true;
          }
          if (t.recurring === 'weekly' && t.done && t.completedAt) {
            const completedDate = new Date(t.completedAt);
            const now = new Date(today);
            const diffDays = Math.floor((now - completedDate) / (1000*60*60*24));
            if (diffDays >= 7) { t.done = false; changed = true; }
          }
        });
      });
    });
    if (changed) saveState();
  }

  function processWeeklyResets() {
    // Les échanges restants sont désormais sans maximum (et alimentés par le scraping) :
    // plus de remise à zéro hebdomadaire automatique. On s'assure juste que le champ existe.
    let changed = false;
    state.accounts.forEach(acc => {
      SERVERS.forEach(s => {
        const sd = acc.servers[s];
        if (!sd.exchanges) { sd.exchanges = makeDefaultExchanges(); changed = true; }
      });
    });
    if (changed) saveState();
  }

  // ============================================================
  // RENDERING
  // ============================================================
  function render() {
    processRecurring();
    processWeeklyResets();
    renderAccountTabs();
    renderServerTabs();
    renderViewTabs();
    renderPanel();
    renderBackupStatus();
  }

  function renderBackupStatus() {
    const el = document.getElementById('backupStatus');
    if (!el) return;
    const days = daysSinceBackup();
    const changes = meta.changesSinceBackup || 0;
    const snoozed = isBackupSnoozed();

    let cls, msg;
    if (changes === 0 && days !== null && days < 2) { cls = 'ok'; msg = 'Sauvegardé'; }
    else if (changes > 0 && (days === null || days >= DAYS_BEFORE_BACKUP_REMINDER)) { cls = 'danger'; msg = 'Non sauvegardé (' + changes + ' modifs)'; }
    else if (changes > 0) { cls = 'warn'; msg = changes + ' modifs depuis la dernière sauvegarde'; }
    else if (days !== null) { cls = 'ok'; msg = 'Sauvegardé il y a ' + days + ' j'; }
    else { cls = 'warn'; msg = 'Jamais sauvegardé'; }
    if (snoozed) msg += ' · rappels en pause';

    el.className = 'status-icon ' + cls;
    el.textContent = '💾';
    el.title = 'Sauvegarde : ' + msg;
  }

  function countRemindersForServerData(sd) {
    const today = todayStr();
    let overdue = 0, todayCount = 0;
    sd.tasks.forEach(t => {
      if (t.done || !t.date) return;
      if (t.date < today) overdue++;
      else if (t.date === today) todayCount++;
    });
    return { overdue, today: todayCount };
  }

  function countRemindersForAccount(acc) {
    let overdue = 0, todayCount = 0;
    SERVERS.forEach(s => {
      const c = countRemindersForServerData(acc.servers[s]);
      overdue += c.overdue;
      todayCount += c.today;
    });
    return { overdue, today: todayCount };
  }

  function makeReminderBadges(counts, tooltipPrefix) {
    const out = [];
    if (counts.overdue > 0) {
      const b = document.createElement('span');
      b.className = 'account-badge overdue';
      b.textContent = counts.overdue;
      b.title = tooltipPrefix + counts.overdue + ' tâche(s) en retard';
      out.push(b);
    }
    if (counts.today > 0) {
      const b = document.createElement('span');
      b.className = 'account-badge today';
      b.textContent = counts.today;
      b.title = tooltipPrefix + counts.today + " tâche(s) pour aujourd'hui";
      out.push(b);
    }
    return out;
  }

  // Returns a status descriptor for the bus goal on one (account, server):
  //   { status: 'reached' | 'almost' | 'pending', total, percent }
  // The goal tracks Repro only (the other fields are storage, not breeding capacity).
  function busesGoalStatus(serverData) {
    if (!serverData || !serverData.buses) return { status: 'pending', total: 0, percent: 0 };
    const total = serverData.buses.repro || 0;
    const percent = Math.min(100, Math.round((total / BUSES_GOAL_TOTAL) * 100));
    let status;
    if (total >= BUSES_GOAL_TOTAL) status = 'reached';
    else if (total >= BUSES_GOAL_WARN) status = 'almost';
    else status = 'pending';
    return { status, total, percent };
  }

  function makeGoalBadge(tooltip, status) {
    const b = document.createElement('span');
    b.className = 'account-badge goal' + (status === 'almost' ? ' almost' : '');
    b.textContent = status === 'almost' ? '◐' : '✓';
    b.title = tooltip;
    return b;
  }

  function accountAllGoalsReached(acc) {
    return SERVERS.every(s => busesGoalStatus(acc.servers[s]).status === 'reached');
  }

  function accountAllGoalsAlmostOrReached(acc) {
    return SERVERS.every(s => {
      const st = busesGoalStatus(acc.servers[s]).status;
      return st === 'reached' || st === 'almost';
    });
  }

  function renderAccountTabs() {
    const bar = document.getElementById('accountsBar');
    bar.innerHTML = '';
    const sortedAccounts = state.accounts.slice().sort((a, b) =>
      a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' })
    );
    sortedAccounts.forEach(acc => {
      const btn = document.createElement('button');
      btn.className = 'account-tab' + (acc.id === state.activeAccountId ? ' active' : '');

      const nameSpan = document.createElement('span');
      nameSpan.textContent = acc.name;
      btn.appendChild(nameSpan);

      const counts = countRemindersForAccount(acc);
      makeReminderBadges(counts, '').forEach(b => btn.appendChild(b));

      // Show a check on the account when both servers' goals are at least
      // "almost reached". Green ✓ if both reached, orange ◐ if at least one
      // is only "almost".
      if (accountAllGoalsReached(acc)) {
        btn.appendChild(makeGoalBadge('Objectif Repro atteint sur les deux serveurs (≥' + BUSES_GOAL_TOTAL + ' chacune)', 'reached'));
      } else if (accountAllGoalsAlmostOrReached(acc)) {
        btn.appendChild(makeGoalBadge('Objectif Repro presque atteint sur les deux serveurs (≥' + BUSES_GOAL_WARN + ' chacune)', 'almost'));
      }

      btn.onclick = () => {
        state.activeAccountId = acc.id;
        // Coming back from "Tous les comptes" — make sure the view is one that
        // makes sense for a real account (any view does, no change needed)
        inventorySortSnapshot = null;
        snapshotForKey = null;
        saveState();
        render();
      };
      bar.appendChild(btn);
    });

    // "Tous les comptes" virtual tab — read-only aggregated inventory view.
    // Only shown when there are at least two real accounts (otherwise
    // identical to just looking at the one account).
    if (state.accounts.length >= 2) {
      // Small separator before the aggregated tab for visual grouping
      const sep = document.createElement('div');
      sep.style.cssText = 'height: 1px; background: var(--border); margin: 6px 4px;';
      bar.appendChild(sep);

      const allBtn = document.createElement('button');
      allBtn.className = 'account-tab' + (isAllAccountsView() ? ' active' : '');
      const span = document.createElement('span');
      span.textContent = '🌐 Tous les comptes';
      allBtn.appendChild(span);
      allBtn.title = 'Vue agrégée sur tous les comptes (lecture seule)';
      allBtn.onclick = () => {
        state.activeAccountId = ALL_ACCOUNTS_ID;
        // Aggregated view supports inventory and buses; keep current view if
        // it's one of those, otherwise default to inventory
        if (state.currentView !== 'inventory' && state.currentView !== 'buses') {
          state.currentView = 'inventory';
        }
        inventorySortSnapshot = null;
        snapshotForKey = null;
        saveState();
        render();
      };
      bar.appendChild(allBtn);
    }

    const addBtn = document.createElement('button');
    addBtn.className = 'add-account-btn';
    addBtn.textContent = '+ Ajouter un compte';
    addBtn.onclick = promptAddAccount;
    bar.appendChild(addBtn);
  }

  function renderServerTabs() {
    const bar = document.getElementById('serverBar');
    bar.innerHTML = '';
    // Server tabs work in aggregated mode too — they switch which server's
    // totals you're looking at
    const isAll = isAllAccountsView();
    if (!isAll && !getActiveAccount()) return;

    const label = document.createElement('span');
    label.className = 'server-bar-label';
    label.textContent = 'Serveur :';
    bar.appendChild(label);

    SERVERS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'server-tab' + (state.activeServer === s ? ' active' : '');

      const nameSpan = document.createElement('span');
      nameSpan.textContent = SERVER_LABELS[s];
      btn.appendChild(nameSpan);

      // No reminder counts in aggregated view (we don't show tasks there)
      if (!isAll) {
        const acc = getActiveAccount();
        const counts = countRemindersForServerData(acc.servers[s]);
        makeReminderBadges(counts, SERVER_LABELS[s] + ' : ').forEach(b => btn.appendChild(b));

        // Goal badge for this server: green if reached, orange if almost
        const status = busesGoalStatus(acc.servers[s]);
        if (status.status === 'reached') {
          btn.appendChild(makeGoalBadge('Objectif Repro atteint sur ' + SERVER_LABELS[s] + ' (' + status.total + '/' + BUSES_GOAL_TOTAL + ')', 'reached'));
        } else if (status.status === 'almost') {
          btn.appendChild(makeGoalBadge('Objectif Repro presque atteint sur ' + SERVER_LABELS[s] + ' (' + status.total + '/' + BUSES_GOAL_TOTAL + ')', 'almost'));
        }
      }

      btn.onclick = () => {
        state.activeServer = s;
        inventorySortSnapshot = null;
        snapshotForKey = null;
        saveState();
        render();
      };
      bar.appendChild(btn);
    });
  }

  function renderViewTabs() {
    const isAll = isAllAccountsView();
    document.querySelectorAll('.view-tab').forEach(t => {
      // In aggregated mode, inventory and buses are both enabled (read-only),
      // but tasks isn't meaningful
      const view = t.dataset.view;
      const allowedInAll = view === 'inventory' || view === 'buses';
      t.disabled = isAll && !allowedInAll;
      t.style.opacity = (isAll && !allowedInAll) ? '0.35' : '';
      t.style.cursor = (isAll && !allowedInAll) ? 'not-allowed' : 'pointer';
      t.classList.toggle('active', view === state.currentView);
      t.onclick = () => {
        if (isAll && !allowedInAll) return;
        state.currentView = view;
        inventorySortSnapshot = null;
        snapshotForKey = null;
        saveState();
        render();
      };
    });
  }

  function renderPanel() {
    if (isAllAccountsView()) {
      // The aggregated view supports inventory and buses (read-only)
      if (state.currentView === 'buses') {
        renderAggregatedBusesPanel();
      } else {
        // Default to inventory if currentView is anything else (e.g. tasks)
        renderAggregatedInventoryPanel();
      }
      return;
    }
    if (state.currentView === 'inventory') {
      renderInventoryPanel();
    } else if (state.currentView === 'buses') {
      renderBusesPanel();
    } else {
      renderTasksPanel();
    }
  }

  function panelHeaderHtml(acc) {
    return `
      <div class="panel-header">
        <h2 class="panel-title">
          ${escapeHtml(acc.name)}
          <span class="panel-subtitle">${escapeHtml(SERVER_LABELS[state.activeServer])}</span>
        </h2>
        <div class="panel-actions">
          <button class="btn" id="renameBtn">Renommer</button>
          <button class="btn danger" id="deleteAccBtn">Supprimer ce compte</button>
        </div>
      </div>
    `;
  }

  // ============================================================
  // TASKS PANEL
  // ============================================================
  function renderTasksPanel() {
    const panel = document.getElementById('mainPanel');
    const acc = getActiveAccount();
    if (!acc) {
      panel.innerHTML = '<div class="panel"><div class="empty">Aucun compte. Ajoute ton premier compte ci-dessus.</div></div>';
      return;
    }
    const sd = getActiveServerData();
    const total = sd.tasks.length;
    const done = sd.tasks.filter(t => t.done).length;
    const overdue = sd.tasks.filter(t => !t.done && t.date && t.date < todayStr()).length;
    const todayCount = sd.tasks.filter(t => !t.done && t.date === todayStr()).length;

    const reminders = sd.tasks
      .filter(t => !t.done && t.date && t.date <= todayStr())
      .sort((a,b) => a.date.localeCompare(b.date));

    panel.innerHTML = `
      <div class="panel">
        ${panelHeaderHtml(acc)}

        <div class="stats">
          <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
          <div class="stat-card"><div class="stat-label">Faites</div><div class="stat-value">${done}</div></div>
          <div class="stat-card"><div class="stat-label">Aujourd'hui</div><div class="stat-value">${todayCount}</div></div>
          <div class="stat-card"><div class="stat-label">En retard</div><div class="stat-value">${overdue}</div></div>
        </div>

        ${reminders.length > 0 ? `
          <div class="reminders-section">
            <p class="reminders-title">🔔 Rappels</p>
            ${reminders.map(t => `<div class="reminder-item">• ${escapeHtml(t.text)} ${t.date < todayStr() ? '(en retard du ' + formatDate(t.date) + ')' : "(aujourd'hui)"}</div>`).join('')}
          </div>
        ` : ''}

        <div class="add-task-row">
          <input type="text" id="newTaskText" placeholder="Nouvelle tâche...">
          <input type="date" id="newTaskDate">
          <select id="newTaskRecurring">
            <option value="">Ponctuelle</option>
            <option value="daily">Quotidienne</option>
            <option value="weekly">Hebdomadaire</option>
          </select>
          <button class="btn primary" id="addTaskBtn">Ajouter</button>
        </div>

        <div class="filter-bar">
          <span style="color: var(--text-muted);">Afficher:</span>
          <button class="filter-btn ${currentFilter==='all'?'active':''}" data-f="all">Toutes</button>
          <button class="filter-btn ${currentFilter==='todo'?'active':''}" data-f="todo">À faire</button>
          <button class="filter-btn ${currentFilter==='done'?'active':''}" data-f="done">Faites</button>
        </div>

        <ul class="task-list" id="taskList"></ul>
      </div>
    `;

    document.getElementById('renameBtn').onclick = () => promptRenameAccount(acc);
    document.getElementById('deleteAccBtn').onclick = () => confirmDeleteAccount(acc);
    document.getElementById('addTaskBtn').onclick = addTask;
    document.getElementById('newTaskText').onkeydown = (e) => { if (e.key === 'Enter') addTask(); };
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.onclick = () => { currentFilter = b.dataset.f; renderPanel(); };
    });

    renderTaskList(sd);
  }

  function renderTaskList(sd) {
    const list = document.getElementById('taskList');
    let tasks = sd.tasks.slice();
    if (currentFilter === 'todo') tasks = tasks.filter(t => !t.done);
    if (currentFilter === 'done') tasks = tasks.filter(t => t.done);

    tasks.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      if (a.date && b.date) return a.date.localeCompare(b.date);
      if (a.date) return -1;
      if (b.date) return 1;
      return 0;
    });

    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty">Aucune tâche pour ce filtre.</div>';
      return;
    }

    list.innerHTML = '';
    tasks.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item';
      const badge = getDateBadge(t.date);
      li.innerHTML = `
        <input type="checkbox" ${t.done ? 'checked' : ''} data-id="${t.id}">
        <div class="task-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}</div>
        <div class="task-meta">
          ${badge ? `<span class="badge badge-date ${badge.cls}">${badge.label}</span>` : ''}
          ${t.recurring ? `<span class="badge badge-recurring">${t.recurring === 'daily' ? 'Quotidien' : 'Hebdo'}</span>` : ''}
          <button class="delete-task" data-del="${t.id}" aria-label="Supprimer">×</button>
        </div>
      `;
      list.appendChild(li);
    });

    list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.onchange = () => toggleTask(cb.dataset.id, cb.checked);
    });
    list.querySelectorAll('[data-del]').forEach(btn => {
      btn.onclick = () => deleteTask(btn.dataset.del);
    });
  }

  function addTask() {
    const text = document.getElementById('newTaskText').value.trim();
    if (!text) return;
    const date = document.getElementById('newTaskDate').value || null;
    const recurring = document.getElementById('newTaskRecurring').value || null;
    const sd = getActiveServerData();
    sd.tasks.push({ id: uid(), text, date, recurring, done: false, completedAt: null });
    document.getElementById('newTaskText').value = '';
    document.getElementById('newTaskDate').value = '';
    document.getElementById('newTaskRecurring').value = '';
    recordChange();
    renderPanel();
    renderAccountTabs();
    renderServerTabs();
  }

  function toggleTask(id, checked) {
    const sd = getActiveServerData();
    const t = sd.tasks.find(x => x.id === id);
    if (!t) return;
    t.done = checked;
    t.completedAt = checked ? todayStr() : null;
    recordChange();
    renderPanel();
    renderAccountTabs();
    renderServerTabs();
  }

  function deleteTask(id) {
    const sd = getActiveServerData();
    sd.tasks = sd.tasks.filter(x => x.id !== id);
    recordChange();
    renderPanel();
    renderAccountTabs();
    renderServerTabs();
  }

  // ============================================================
  // INVENTORY PANEL
  // ============================================================
  // qtyGetter: function(itemId) -> number. Lets this snapshot work for both
  // per-account views (using a server-data object) and the aggregated view.
  function buildInventorySnapshotWith(qtyGetter) {
    const snap = {};
    state.itemCatalog.forEach(item => {
      const q = qtyGetter(item.id);
      snap[item.id] = { wasInStock: q > 0, qtyAtSnapshot: q };
    });
    return snap;
  }

  function buildInventorySnapshot(sd) {
    return buildInventorySnapshotWith(id => getQty(sd, id));
  }

  function renderInventoryPanel() {

      snapshotForKey = key;

    const totalQty = state.itemCatalog.reduce(
      (s, item) => itemCountsInTotal(item) ? s + getQty(sd, item.id) : s,
      0
    );

    const categoryOptions = CATEGORIES.map(c => `<option value="${c.id}">${escapeHtml(c.label)}</option>`).join('');

    panel.innerHTML = `
      <div class="panel">
        ${panelHeaderHtml(acc)}

        <div class="exchanges-card">
          <div class="exchanges-info">
            <span class="exchanges-label">🔄 Échanges restants</span>
            <span class="exchanges-reset-info" id="exchangesResetInfo">${formatResetInfo()}</span>
          </div>
          <div class="exchanges-controls">
            <button class="exchanges-btn" id="exchangesDecBtn" aria-label="Retirer un échange">−</button>
            <span class="exchanges-value" id="exchangesValue">${sd.exchanges.count}</span>
            <button class="exchanges-btn" id="exchangesIncBtn" aria-label="Ajouter un échange">+</button>
          </div>
        </div>

        <div class="inv-shared-note">
          ℹ️ La liste des objets est partagée entre tous les comptes et serveurs. Les quantités affichées sont celles de ${escapeHtml(acc.name)} — ${escapeHtml(SERVER_LABELS[state.activeServer])}. Le tri s'actualise quand tu changes d'onglet, de compte ou de serveur.
        </div>

        <div class="inv-updated-at ${sd.inventoryUpdatedAt ? '' : 'never'}" id="invUpdatedAt"
             title="${sd.inventoryUpdatedAt ? escapeHtml(new Date(sd.inventoryUpdatedAt).toLocaleString('fr-FR')) : ''}">
          ${sd.inventoryUpdatedAt ? 'Mis à jour ' + escapeHtml(formatInventoryUpdated(sd.inventoryUpdatedAt)) : 'Jamais mis à jour'}
        </div>

        <div class="inv-summary">
          <div class="stat-card"><div class="stat-label">Types en stock</div><div class="stat-value" id="invStatInStock">${inStockCount}</div></div>
          <div class="stat-card"><div class="stat-label">Total d'objets</div><div class="stat-value" id="invStatTotalQty">${totalQty}</div></div>
          <div class="stat-card"><div class="stat-label">Objets référencés</div><div class="stat-value">${distinctTypes}</div></div>
        </div>

        <div class="inv-add-row">
          <input type="text" id="newItemName" placeholder="Nom du nouvel objet...">
          <select id="newItemCategory">${categoryOptions}</select>
          <button class="btn primary" id="addItemBtn">Ajouter</button>
          <button class="btn" id="importMNBtn" title="Importer un fichier JSON exporté depuis le marché noir du jeu">📥 Importer depuis le jeu</button>
          <input type="file" id="importMNFile" accept=".json" style="display:none;">

    document.getElementById('importMNBtn').onclick = () => document.getElementById('importMNFile').click();
    document.getElementById('importMNFile').onchange = (e) => {
