  // ============================================================
  // AGGREGATED INVENTORY PANEL ("Tous les comptes" — read-only)
  // ============================================================
  function renderAggregatedInventoryPanel() {
    const panel = document.getElementById('mainPanel');
    if (state.accounts.length === 0) {
      panel.innerHTML = '<div class="panel"><div class="empty">Aucun compte.</div></div>';
      return;
    }

    // Refresh snapshot when entering the view / switching server
    const key = ALL_ACCOUNTS_ID + '|' + state.activeServer;
    if (!inventorySortSnapshot || snapshotForKey !== key) {
      inventorySortSnapshot = buildInventorySnapshotWith(id => getAggregatedQty(id));
      snapshotForKey = key;
    }

    const inStockCount = state.itemCatalog.filter(item => getAggregatedQty(item.id) > 0).length;
    const totalQty = state.itemCatalog.reduce(
      (s, item) => itemCountsInTotal(item) ? s + getAggregatedQty(item.id) : s,
      0
    );
    const distinctTypes = state.itemCatalog.length;

    panel.innerHTML = `
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">
            🌐 Tous les comptes
            <span class="panel-subtitle">${escapeHtml(SERVER_LABELS[state.activeServer])}</span>
          </h2>
        </div>

        <div class="inv-shared-note">
          ℹ️ Vue agrégée en lecture seule. Les quantités correspondent au total de tes ${state.accounts.length} comptes sur ${escapeHtml(SERVER_LABELS[state.activeServer])}. Survole un objet pour voir la répartition par compte.
        </div>

        ${(() => {
          // For the aggregated view, show the OLDEST update time among accounts
          // that have ever been updated. That way the user knows the "worst case".
          // Tooltip carries the per-account breakdown.
          const stamps = state.accounts.map(a => ({
            name: a.name,
            iso: a.servers[state.activeServer].inventoryUpdatedAt
          }));
          const withStamps = stamps.filter(s => s.iso);
          if (withStamps.length === 0) {
            return '<div class="inv-updated-at never">Aucun compte n\'a encore d\'inventaire à jour.</div>';
          }
          // Find the oldest
          withStamps.sort((x, y) => new Date(x.iso) - new Date(y.iso));
          const oldest = withStamps[0];
          const breakdown = stamps.slice().sort((x, y) => {
            // Updated first (most recent first), then never-updated at the end
            if (!x.iso && !y.iso) return x.name.localeCompare(y.name, 'fr');
            if (!x.iso) return 1;
            if (!y.iso) return -1;
            return new Date(y.iso) - new Date(x.iso);
          }).map(s => {
            const label = s.iso ? formatInventoryUpdated(s.iso) : 'jamais';
            return escapeHtml(s.name) + ' : ' + escapeHtml(label);
          }).join('\n');
          return `
            <div class="inv-updated-at" id="invUpdatedAt"
                 title="${escapeHtml(breakdown)}">
              Inventaire le moins récent : ${escapeHtml(oldest.name)} — ${escapeHtml(formatInventoryUpdated(oldest.iso))}
              ${withStamps.length < state.accounts.length ? '<span style="color: var(--warning); margin-left: 6px;">⚠ ' + (state.accounts.length - withStamps.length) + ' compte(s) jamais à jour</span>' : ''}
            </div>
          `;
        })()}

        <div class="inv-summary">
          <div class="stat-card"><div class="stat-label">Types en stock</div><div class="stat-value">${inStockCount}</div></div>
          <div class="stat-card"><div class="stat-label">Total d'objets</div><div class="stat-value">${totalQty}</div></div>
          <div class="stat-card"><div class="stat-label">Objets référencés</div><div class="stat-value">${distinctTypes}</div></div>
        </div>

        <input type="text" class="inv-search" id="invSearch" placeholder="🔍 Rechercher un objet...">
        ${renderInvFilterBarHtml()}

        <div id="invContent"></div>
      </div>
    `;

    document.getElementById('invSearch').oninput = (e) => {
      inventorySortSnapshot = buildInventorySnapshotWith(id => getAggregatedQty(id));
      renderAggregatedContent(e.target.value);
    };
    wireInvFilterBar(() => renderAggregatedInventoryPanel());

    renderAggregatedContent('');
  }

  function renderAggregatedContent(searchTerm) {
    const container = document.getElementById('invContent');
    container.innerHTML = '';
    const search = (searchTerm || '').toLowerCase().trim();

    let items = state.itemCatalog.slice();
    if (search) items = items.filter(i => i.name.toLowerCase().includes(search));
    items = items.filter(item => itemMatchesFilter(item, getAggregatedQty(item.id)));

    const inStockItems = items.filter(item => {
      const snap = inventorySortSnapshot[item.id];
      return snap && snap.wasInStock;
    });
    const outStockItems = items.filter(item => {
      const snap = inventorySortSnapshot[item.id];
      return !snap || !snap.wasInStock;
    });

    if (inStockItems.length === 0 && outStockItems.length === 0) {
      container.innerHTML = '<div class="empty">Aucun objet trouvé.</div>';
      return;
    }

    if (inStockItems.length > 0) {
      const h = document.createElement('div');
      h.className = 'inv-section-header in-stock';
      h.textContent = `✓ En stock (${inStockItems.length})`;
      container.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'inv-categories-grid';
      container.appendChild(grid);
      renderAggregatedItemsByCategory(grid, inStockItems, true);
    }
    if (outStockItems.length > 0) {
      const h = document.createElement('div');
      h.className = 'inv-section-header out-stock';
      h.textContent = `Hors stock (${outStockItems.length})`;
      container.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'inv-categories-grid';
      container.appendChild(grid);
      renderAggregatedItemsByCategory(grid, outStockItems, false);
    }
  }

  function renderAggregatedItemsByCategory(container, items, isInStockSection) {
    // Per-account breakdown for the tooltip in aggregated view: list every
    // account that holds the item, sorted by qty desc.
    function aggregatedBreakdownFor(itemId) {
      const total = getAggregatedQty(itemId);
      const breakdown = [];
      state.accounts.forEach(a => {
        const q = getQty(a.servers[state.activeServer], itemId);
        if (q > 0) breakdown.push({ name: a.name, qty: q });
      });
      breakdown.sort((x, y) => {
        if (x.qty !== y.qty) return y.qty - x.qty;
        return x.name.localeCompare(y.name, 'fr');
      });
      return { total, breakdown };
    }

    CATEGORIES.forEach(cat => {
      let catItems = items.filter(i => i.category === cat.id);
      if (catItems.length === 0) return;

      catItems.sort((a, b) => {
        if (isInStockSection) {
          const qa = inventorySortSnapshot[a.id]?.qtyAtSnapshot || 0;
          const qb = inventorySortSnapshot[b.id]?.qtyAtSnapshot || 0;
          if (qa !== qb) return qb - qa;
        }
        return a.name.localeCompare(b.name, 'fr');
      });

      const catDiv = document.createElement('div');
      catDiv.className = 'inv-category';
      catDiv.innerHTML = `
        <div class="inv-category-header">
          <span>${escapeHtml(cat.label)}</span>
          <span class="inv-category-count">${catItems.length}</span>
        </div>
        <ul class="inv-list"></ul>
      `;
      container.appendChild(catDiv);

      const list = catDiv.querySelector('.inv-list');
      catItems.forEach(item => {
        const totalQty = getAggregatedQty(item.id);
        const data = aggregatedBreakdownFor(item.id);

        const li = document.createElement('li');
        li.className = 'inv-item ' + (totalQty > 0 ? 'in-stock' : 'out');

        // Build the breakdown tooltip
        const tooltipRows = data.breakdown.map(row =>
          `<div class="inv-total-tooltip-row">
            <span class="name">${escapeHtml(row.name)}</span>
            <span class="qty">${row.qty}</span>
          </div>`
        ).join('');

        // The aggregated value itself shows the tooltip on hover
        const valueWithTooltip = totalQty > 0
          ? `<div class="inv-other-accounts" tabindex="0" style="font-size: 14px; font-weight: 500; color: var(--text);">
              ${totalQty}
              <div class="inv-total-tooltip" role="tooltip">
                <div class="inv-total-tooltip-header">${escapeHtml(SERVER_LABELS[state.activeServer])} · ${data.breakdown.length} compte(s)</div>
                ${tooltipRows}
              </div>
            </div>`
          : `<span class="qty-display">${totalQty}</span>`;

        const imgUrl = item.imageUrl || imageUrlForSlug(item.slug);
        const imgHtml = imgUrl
          ? `<img class="inv-item-image" src="${escapeHtml(imgUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : '';

        li.innerHTML = `
          ${imgHtml}
          <div class="inv-item-name">${escapeHtml(item.name)}</div>
          <div class="inv-controls">${valueWithTooltip}</div>
        `;
        list.appendChild(li);
      });
    });
  }

  // ============================================================
  // AGGREGATED BUSES PANEL ("Tous les comptes" — read-only)
  // ============================================================
  function renderAggregatedBusesPanel() {
    const panel = document.getElementById('mainPanel');
    if (state.accounts.length === 0) {
      panel.innerHTML = '<div class="panel"><div class="empty">Aucun compte.</div></div>';
      return;
    }

    // Compute per-account values and totals on the active server
    const server = state.activeServer;
    const fields = [
      { key: 'repro',  label: 'Repro',   isLots: false },
      { key: 'stockF', label: 'Stock F', isLots: false },
      { key: 'stockM', label: 'Stock M', isLots: true }  // shown as lots of 200, drop the remainder
    ];

    function valueFor(account, field) {
      const raw = account.servers[server].buses[field.key] || 0;
      // For stockM we report in lots of 200 (drop the remainder, per Lison's spec)
      return field.isLots ? Math.floor(raw / STOCK_M_LOT_SIZE) : raw;
    }

    // Per-field totals
    const totals = {};
    fields.forEach(f => {
      totals[f.key] = state.accounts.reduce((sum, a) => sum + valueFor(a, f), 0);
    });

    // Per-field breakdowns: list of {accountName, value} (only those with > 0),
    // sorted by value desc
    function breakdownFor(field) {
      return state.accounts
        .map(a => ({ accountName: a.name, value: valueFor(a, field) }))
        .filter(b => b.value > 0)
        .sort((x, y) => y.value - x.value || x.accountName.localeCompare(y.accountName, 'fr'));
    }

    // How many accounts have reached vs almost-reached their goal on this server
    const goalsReached = state.accounts.filter(a => busesGoalStatus(a.servers[server]).status === 'reached').length;
    const goalsAlmost = state.accounts.filter(a => busesGoalStatus(a.servers[server]).status === 'almost').length;

    function fieldCardHtml(field) {
      const total = totals[field.key];
      const breakdown = breakdownFor(field);

      // Build the per-account tooltip rows (one account per line)
      const tooltipRows = breakdown.map(row =>
        `<div class="inv-total-tooltip-row">
          <span class="name">${escapeHtml(row.accountName)}</span>
          <span class="qty">${row.value}</span>
        </div>`
      ).join('');

      const valueDisplay = field.isLots
        ? `${total} <span style="font-size: 14px; font-weight: 500; color: var(--text-muted);">lot${total > 1 ? 's' : ''}</span>`
        : total;

      const tooltipHtml = breakdown.length > 0
        ? `<div class="inv-total-tooltip" role="tooltip">
             <div class="inv-total-tooltip-header">${escapeHtml(SERVER_LABELS[server])} · ${breakdown.length} compte(s)</div>
             ${tooltipRows}
           </div>`
        : '';

      return `
        <div class="buse-card">
          <div class="buse-label">${escapeHtml(field.label)}</div>
          <div class="inv-other-accounts" tabindex="${breakdown.length > 0 ? '0' : '-1'}"
               style="font-size: 30px; font-weight: 700; color: var(--text-title);
                      font-family: var(--font-title); display: flex; justify-content: center;
                      align-items: baseline; height: 60px; cursor: ${breakdown.length > 0 ? 'help' : 'default'};">
            ${valueDisplay}
            ${tooltipHtml}

  function changeExchanges(delta) {
    const sd = getActiveServerData();
    if (!sd) return;
    if (!sd.exchanges) sd.exchanges = makeDefaultExchanges();
    const newCount = Math.max(0, sd.exchanges.count + delta); // pas de plafond
    if (newCount === sd.exchanges.count) return;
    sd.exchanges.count = newCount;
    recordChange();
    updateExchangesUI();
  }

  // Returns true if the item passes the active filter (independent of the
  // text search; combine the two when filtering).
  function itemMatchesFilter(item, qty) {
    if (inventoryFilter === 'all') return true;
    if (inventoryFilter === 'inStock') return qty > 0;
    if (inventoryFilter === 'outOfStock') return qty === 0;
    // Otherwise: category id
    return item.category === inventoryFilter;
  }

  function renderInventoryContent(sd, searchTerm) {
    const container = document.getElementById('invContent');
    container.innerHTML = '';
    const search = (searchTerm || '').toLowerCase().trim();

    let items = state.itemCatalog.slice();
    if (search) items = items.filter(i => i.name.toLowerCase().includes(search));
    // Apply the dropdown/button filter using current quantities, not the snapshot,
    // so toggling between "in stock" / "out of stock" reflects what the user sees
    items = items.filter(item => itemMatchesFilter(item, getQty(sd, item.id)));

    const inStockItems = items.filter(item => {
      const snap = inventorySortSnapshot[item.id];
      return snap && snap.wasInStock;
    });
    const outStockItems = items.filter(item => {
      const snap = inventorySortSnapshot[item.id];
      return !snap || !snap.wasInStock;
    });

    if (inStockItems.length === 0 && outStockItems.length === 0) {
      container.innerHTML = '<div class="empty">Aucun objet trouvé.</div>';
      return;
    }

    if (inStockItems.length > 0) {
      const h = document.createElement('div');
      h.className = 'inv-section-header in-stock';
      h.textContent = `✓ En stock (${inStockItems.length})`;
      container.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'inv-categories-grid';
      container.appendChild(grid);
      renderItemsByCategory(grid, sd, inStockItems, true);
    }
    if (outStockItems.length > 0) {
      const h = document.createElement('div');
      h.className = 'inv-section-header out-stock';
      h.textContent = `Hors stock (${outStockItems.length})`;
      container.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'inv-categories-grid';
      container.appendChild(grid);
      renderItemsByCategory(grid, sd, outStockItems, false);
    }
  }

  function renderItemsByCategory(container, sd, items, isInStockSection) {
    const acc = getActiveAccount();

    // Compute the total quantity of an item across ALL accounts on the
    // currently active server, plus a per-account breakdown for the tooltip.
    // Returns null when only the active account has any (the per-account
    // quantity is already shown, no point repeating).
    function serverTotalFor(itemId) {
      let total = 0;
      let othersHaveIt = false;
      const breakdown = []; // [{name, qty, isActive}]
      state.accounts.forEach(a => {
        const q = getQty(a.servers[state.activeServer], itemId);
        total += q;
        if (q > 0) {
          breakdown.push({ name: a.name, qty: q, isActive: a.id === acc.id });
          if (a.id !== acc.id) othersHaveIt = true;
        }
      });
      if (!othersHaveIt) return null;
      // Sort: active account first, then by qty desc, then by name
      breakdown.sort((x, y) => {
        if (x.isActive !== y.isActive) return x.isActive ? -1 : 1;
        if (x.qty !== y.qty) return y.qty - x.qty;
        return x.name.localeCompare(y.name, 'fr');
      });
      return { total, breakdown };
    }

    CATEGORIES.forEach(cat => {
      let catItems = items.filter(i => i.category === cat.id);
      if (catItems.length === 0) return;

      catItems.sort((a, b) => {
        if (isInStockSection) {
          const qa = inventorySortSnapshot[a.id]?.qtyAtSnapshot || 0;
          const qb = inventorySortSnapshot[b.id]?.qtyAtSnapshot || 0;
          if (qa !== qb) return qb - qa;
        }
        return a.name.localeCompare(b.name, 'fr');
      });

      const catDiv = document.createElement('div');
      catDiv.className = 'inv-category';
      catDiv.innerHTML = `
        <div class="inv-category-header">
          <span>${escapeHtml(cat.label)}</span>
          <span class="inv-category-count">${catItems.length}</span>
        </div>
        <ul class="inv-list"></ul>
      `;
      container.appendChild(catDiv);

      const list = catDiv.querySelector('.inv-list');
      catItems.forEach(item => {
        const qty = getQty(sd, item.id);
        const useFreeInput = isFreeInputItem(item.name);
        const totalAcrossAccounts = serverTotalFor(item.id);

        const li = document.createElement('li');
        li.className = 'inv-item ' + (qty > 0 ? 'in-stock' : 'out');
        li.dataset.itemId = item.id;

        let controlsHtml;
        if (useFreeInput) {
          controlsHtml = `
            <input type="number" min="0" step="1" class="qty-input" data-id="${item.id}" value="${qty}" inputmode="numeric" aria-label="Quantité">
            <button class="inv-edit" data-edit="${item.id}" aria-label="Éditer cet objet" title="Modifier le nom ou la catégorie">✏️</button>
            <button class="inv-delete" data-del="${item.id}" aria-label="Supprimer cet objet" title="Retirer de la liste (sur tous les comptes/serveurs)">×</button>
          `;
        } else {
          controlsHtml = `
            <button class="qty-btn" data-action="dec" data-id="${item.id}" ${qty <= 0 ? 'disabled' : ''} aria-label="Retirer un">−</button>
            <span class="qty-display" data-display="${item.id}">${qty}</span>
            <button class="qty-btn" data-action="inc" data-id="${item.id}" aria-label="Ajouter un">+</button>
            <button class="inv-edit" data-edit="${item.id}" aria-label="Éditer cet objet" title="Modifier le nom ou la catégorie">✏️</button>
            <button class="inv-delete" data-del="${item.id}" aria-label="Supprimer cet objet" title="Retirer de la liste (sur tous les comptes/serveurs)">×</button>
          `;
        }

        let totalHint = '';
        if (totalAcrossAccounts !== null) {
          const tooltipRows = totalAcrossAccounts.breakdown.map(row =>
            `<div class="inv-total-tooltip-row${row.isActive ? ' is-active' : ''}">
              <span class="name">${escapeHtml(row.name)}</span>
              <span class="qty">${row.qty}</span>
            </div>`
          ).join('');
          totalHint = `
            <div class="inv-other-accounts" tabindex="0">
              ∑ ${totalAcrossAccounts.total}
              <div class="inv-total-tooltip" role="tooltip">
                <div class="inv-total-tooltip-header">${escapeHtml(SERVER_LABELS[state.activeServer])} · ${totalAcrossAccounts.breakdown.length} compte(s)</div>
                ${tooltipRows}
              </div>
            </div>
          `;
        }

        // Build the optional image tag. We use onerror to hide the img if the
        // URL is broken, so we don't show a broken-image icon.
        const imgUrl = item.imageUrl || imageUrlForSlug(item.slug);
        const imgHtml = imgUrl
          ? `<img class="inv-item-image" src="${escapeHtml(imgUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : '';

        li.innerHTML = `
          ${imgHtml}
          <div class="inv-item-name">${escapeHtml(item.name)}</div>
          ${totalHint}
          <div class="inv-controls">${controlsHtml}</div>
        `;
        list.appendChild(li);
      });
    });

    container.querySelectorAll('[data-action]').forEach(btn => {
      btn.onclick = () => changeQty(btn.dataset.id, btn.dataset.action === 'inc' ? 1 : -1);
    });
    container.querySelectorAll('.qty-input').forEach(input => {
      input.addEventListener('focus', () => input.select());
      input.addEventListener('change', () => {
        let val = parseInt(input.value, 10);
        if (isNaN(val) || val < 0) val = 0;
        input.value = val;
        setQty(input.dataset.id, val);
      });
    });
    container.querySelectorAll('[data-edit]').forEach(btn => {
      btn.onclick = () => promptEditCatalogItem(btn.dataset.edit);
    });
    container.querySelectorAll('[data-del]').forEach(btn => {
      btn.onclick = () => confirmDeleteCatalogItem(btn.dataset.del);
    });
  }

  function updateInvSummary(sd) {
    const inStockCount = state.itemCatalog.filter(item => getQty(sd, item.id) > 0).length;
    const totalQty = state.itemCatalog.reduce(
      (s, item) => itemCountsInTotal(item) ? s + getQty(sd, item.id) : s,
      0
    );
    const elIn = document.getElementById('invStatInStock');
    const elTot = document.getElementById('invStatTotalQty');
    if (elIn) elIn.textContent = inStockCount;
    if (elTot) elTot.textContent = totalQty;
  }

  function updateItemRowVisuals(sd, itemId) {
    const qty = getQty(sd, itemId);
    const li = document.querySelector(`.inv-item[data-item-id="${itemId}"]`);
    if (li) {
      li.classList.toggle('in-stock', qty > 0);
      li.classList.toggle('out', qty <= 0);
    }
    const display = document.querySelector(`[data-display="${itemId}"]`);
    if (display) display.textContent = qty;
    const decBtn = document.querySelector(`.qty-btn[data-action="dec"][data-id="${itemId}"]`);
    if (decBtn) decBtn.disabled = qty <= 0;
  }

  function changeQty(itemId, delta) {
    const sd = getActiveServerData();
    const current = getQty(sd, itemId);
    const newQty = Math.max(0, current + delta);
    if (newQty === current) return;
    if (newQty === 0) delete sd.quantities[itemId];
    else sd.quantities[itemId] = newQty;
    markInventoryUpdated(sd);
    recordChange();
    updateItemRowVisuals(sd, itemId);
    updateInvSummary(sd);
    updateInventoryTimestamp(sd);
  }

  function setQty(itemId, value) {
    const sd = getActiveServerData();
    const newQty = Math.max(0, Math.floor(value));
    if (newQty === 0) delete sd.quantities[itemId];
    else sd.quantities[itemId] = newQty;
    markInventoryUpdated(sd);
    recordChange();
    updateItemRowVisuals(sd, itemId);
    updateInvSummary(sd);
    updateInventoryTimestamp(sd);
  }

  // Refresh the small "last update" line in the panel, without re-rendering
  // the whole inventory (which would lose scroll position and snapshot).
  function updateInventoryTimestamp(sd) {
    const el = document.getElementById('invUpdatedAt');
    if (!el || !sd) return;
    const formatted = formatInventoryUpdated(sd.inventoryUpdatedAt);
    el.textContent = formatted ? 'Mis à jour ' + formatted : 'Jamais mis à jour';
    el.title = sd.inventoryUpdatedAt
      ? new Date(sd.inventoryUpdatedAt).toLocaleString('fr-FR')
      : '';
  }

  function addCatalogItem() {
    const nameInput = document.getElementById('newItemName');
    const categorySelect = document.getElementById('newItemCategory');
    const name = nameInput.value.trim();
    if (!name) return;
    const existing = state.itemCatalog.find(i => i.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      alert('Un objet avec ce nom existe déjà dans la liste partagée.');
      return;
    }
    const newId = uid('item_');
    state.itemCatalog.push({ id: newId, name, category: categorySelect.value });
    const sd = getActiveServerData();
    sd.quantities[newId] = 1;
    markInventoryUpdated(sd);
    nameInput.value = '';
    recordChange();
    inventorySortSnapshot = null;
    snapshotForKey = null;
    renderInventoryPanel();
  }

      const collision = state.itemCatalog.find(i =>

  function confirmDeleteCatalogItem(itemId) {
    const item = state.itemCatalog.find(i => i.id === itemId);
    if (!item) return;
    const places = [];
    state.accounts.forEach(a => {
      SERVERS.forEach(s => {
        const q = getQty(a.servers[s], itemId);
        if (q > 0) places.push(a.name + ' / ' + SERVER_LABELS[s] + ' (' + q + ')');
      });
    });
    let message = `Retirer "${item.name}" de la liste partagée ?`;
    if (places.length > 0) {
      message += `\n\nAttention : tu as encore en stock sur : ${places.join(', ')}. Ces quantités seront perdues.`;
    } else {
      message += '\n\nCet objet sera retiré de tous les comptes/serveurs.';
    }
    showConfirm(message, () => {
      state.itemCatalog = state.itemCatalog.filter(i => i.id !== itemId);
      state.accounts.forEach(a => {
        SERVERS.forEach(s => {
          // Only touch the timestamp on (compte, serveur) that actually had the item
          if (a.servers[s].quantities[itemId]) {
            delete a.servers[s].quantities[itemId];
            markInventoryUpdated(a.servers[s]);
          }
        });
      });
      recordChange();
      inventorySortSnapshot = null;
      snapshotForKey = null;
      renderInventoryPanel();
    });
  }

  function importMNInventoryFromFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.type !== 'equideow-mn-inventory' || !Array.isArray(data.items)) {
          alert("Ce fichier ne semble pas être un export d'inventaire MN. Utilise le bouton « 📥 Exporter pour gestionnaire » depuis la page du marché noir du jeu.");
          return;
        }
        promptMNInventoryImport(data);
      } catch (err) {
        alert('Erreur de lecture du fichier : ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  function applyMNInventoryImport(payload, targetAccountId, targetServer) {
    const acc = state.accounts.find(a => a.id === targetAccountId);
    if (!acc || !SERVERS.includes(targetServer)) {
      alert('Cible introuvable.');
      return;
    }
    const sd = acc.servers[targetServer];

    const slugToCatalogId = new Map();
    const nameToCatalogId = new Map();
    state.itemCatalog.forEach(item => {
      if (item.slug) slugToCatalogId.set(item.slug.toLowerCase(), item.id);
      nameToCatalogId.set(item.name.toLowerCase(), item.id);
    });

    let addedItems = 0;
    let updatedItems = 0;
    const seenCatalogIds = new Set();

    payload.items.forEach(importedItem => {
      const lookupName = (importedItem.name || importedItem.rawName || '').trim();
      const slug = (importedItem.slug || '').trim().toLowerCase();
      if (!lookupName && !slug) return;

      let catalogId = null;
      if (slug) catalogId = slugToCatalogId.get(slug);
      if (!catalogId && lookupName) catalogId = nameToCatalogId.get(lookupName.toLowerCase());

      if (catalogId) {
        const existing = state.itemCatalog.find(i => i.id === catalogId);
        if (existing) {
          // Opportunistically attach slug + image URL for future matching/rendering
          if (slug && !existing.slug) {
            existing.slug = slug;
            slugToCatalogId.set(slug, catalogId);
          }
          if (importedItem.imageUrl && !existing.imageUrl) {
            existing.imageUrl = importedItem.imageUrl;
          }
        }
      } else {
        catalogId = uid('item_');
        state.itemCatalog.push({
          id: catalogId,
          name: lookupName,
          category: importedItem.category || 'autres',
          slug: slug || undefined,
          imageUrl: importedItem.imageUrl || undefined
        });
        if (slug) slugToCatalogId.set(slug, catalogId);
        nameToCatalogId.set(lookupName.toLowerCase(), catalogId);
        addedItems++;
      }

      const qty = Math.max(0, parseInt(importedItem.qty, 10) || 0);
      if (qty > 0) sd.quantities[catalogId] = qty;
      else delete sd.quantities[catalogId];
      seenCatalogIds.add(catalogId);
      updatedItems++;
    });

    Object.keys(sd.quantities).forEach(cid => {
      if (!seenCatalogIds.has(cid)) delete sd.quantities[cid];
    });

    markInventoryUpdated(sd);
    recordChange();
    inventorySortSnapshot = null;
    snapshotForKey = null;
    render();

    let msg = `✓ Inventaire importé sur ${acc.name} / ${SERVER_LABELS[targetServer]}.\n${updatedItems} objet(s) traité(s).`;
    if (addedItems > 0) msg += `\n${addedItems} nouveau(x) objet(s) ajouté(s) au catalogue.`;
    alert(msg);
  }

        <div class="buses-grid">
          <div class="buse-card">
            <div class="buse-label">Repro</div>
            <input type="number" min="0" step="1" class="buse-input" id="buseRepro" value="${buses.repro || 0}" inputmode="numeric">
          </div>
          <div class="buse-card">
            <div class="buse-label">Stock F</div>
            <input type="number" min="0" step="1" class="buse-input" id="buseStockF" value="${buses.stockF || 0}" inputmode="numeric">
          </div>
          <div class="buse-card">
            <div class="buse-label">Stock M</div>
            <input type="number" min="0" step="1" class="buse-input" id="buseStockM" value="${buses.stockM || 0}" inputmode="numeric">
            <div class="buse-extra">
              = <span class="buse-lots" id="buseLots">${lotsLabel}</span>${remainder > 0 ? ` <span style="color: var(--text-light);">+ ${remainder}</span>` : ''}
            </div>
          </div>
        </div>

        <div class="buses-goal-card status-${busesGoalStatus(sd).status}">
          <div class="buses-goal-header">
            <span class="buses-goal-label">
              ${busesGoalStatus(sd).status === 'reached' ? '✅ Objectif Repro atteint' :
                busesGoalStatus(sd).status === 'almost' ? '◐ Objectif Repro presque atteint' :
                '🎯 Objectif Repro'}
              sur ${escapeHtml(SERVER_LABELS[state.activeServer])}
            </span>
            <span class="buses-goal-value">
              <strong>${busesGoalStatus(sd).total}</strong> / ${BUSES_GOAL_TOTAL}
            </span>
          </div>
          <div class="buses-goal-progress">
            <div class="buses-goal-progress-fill" style="width: ${busesGoalStatus(sd).percent}%"></div>
          </div>
          <div class="buses-goal-hint">
            ${busesGoalStatus(sd).status === 'reached'
              ? "Tu as atteint l'objectif des " + BUSES_GOAL_TOTAL + ' buses Repro !'
              : busesGoalStatus(sd).status === 'almost'
                ? 'Tu y es presque ! Il te manque ' + (BUSES_GOAL_TOTAL - busesGoalStatus(sd).total) + ' Repro.'
                : 'Il te manque ' + (BUSES_GOAL_TOTAL - busesGoalStatus(sd).total) + ' Repro pour atteindre l\'objectif.'}
          </div>
        </div>

        <div class="buses-summary">
          📊 Total buses sur ${escapeHtml(acc.name)} / ${escapeHtml(SERVER_LABELS[state.activeServer])} : <strong>${totalBuses}</strong>
        </div>
      </div>
    `;

    document.getElementById('renameBtn').onclick = () => promptRenameAccount(acc);
    document.getElementById('deleteAccBtn').onclick = () => confirmDeleteAccount(acc);

    function handleChange(field, input) {
      input.addEventListener('change', () => {
        let val = parseInt(input.value, 10);
        if (isNaN(val) || val < 0) val = 0;
        input.value = val;
        sd.buses[field] = val;
        recordChange();
        renderBusesPanel();
        // Re-render the tabs because the goal status may have just changed
        renderAccountTabs();
        renderServerTabs();
      });
      input.addEventListener('focus', () => input.select());
    }
    handleChange('repro', document.getElementById('buseRepro'));
    handleChange('stockF', document.getElementById('buseStockF'));
    handleChange('stockM', document.getElementById('buseStockM'));
  }

  // ============================================================
  // MODALS
  // ============================================================
  function showModal(title, defaultValue, onConfirm, confirmLabel) {
    const c = document.getElementById('modalContainer');
    c.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal">
          <h3>${escapeHtml(title)}</h3>
          <input type="text" id="modalInput" value="${escapeHtml(defaultValue || '')}">
          <div class="modal-actions">
            <button class="btn" id="modalCancel">Annuler</button>
            <button class="btn primary" id="modalOk">${escapeHtml(confirmLabel || 'OK')}</button>
          </div>
        </div>
      </div>
    `;
    const input = document.getElementById('modalInput');
    input.focus();
    input.select();
    const close = () => { c.innerHTML = ''; };
    const ok = () => { const v = input.value.trim(); if (v) onConfirm(v); close(); };
    document.getElementById('modalCancel').onclick = close;
    document.getElementById('modalOk').onclick = ok;
    input.onkeydown = (e) => { if (e.key === 'Enter') ok(); if (e.key === 'Escape') close(); };
  }

  function showConfirm(message, onYes) {
    const c = document.getElementById('modalContainer');
    c.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal">
          <h3 style="white-space: pre-line;">${escapeHtml(message)}</h3>
          <div class="modal-actions">
            <button class="btn" id="modalCancel">Annuler</button>
            <button class="btn danger" id="modalOk">Supprimer</button>
          </div>
        </div>
      </div>
    `;
    const close = () => { c.innerHTML = ''; };
    document.getElementById('modalCancel').onclick = close;
    document.getElementById('modalOk').onclick = () => { onYes(); close(); };
  }

  function showCustomModal(title, message, buttons) {
    const c = document.getElementById('modalContainer');
    const buttonsHtml = buttons.map((b, i) =>
      `<button class="btn ${b.cls}" data-idx="${i}">${escapeHtml(b.label)}</button>`
    ).join('');
    c.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(message)}</p>
          <div class="modal-actions">${buttonsHtml}</div>
        </div>
      </div>
    `;
    const close = () => { c.innerHTML = ''; };
    c.querySelectorAll('[data-idx]').forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.dataset.idx);
        close();
        if (buttons[idx].action) buttons[idx].action();
      };
    });
  }

  function promptAddAccount() {
    showModal('Nom du nouveau compte', '', (name) => {
      const newAcc = makeDefaultAccount(name);
      state.accounts.push(newAcc);
      state.activeAccountId = newAcc.id;
      state.activeServer = 'gaia';
      recordChange();
      render();
    }, 'Ajouter');
  }

  function promptRenameAccount(acc) {
    showModal('Renommer le compte', acc.name, (name) => {
      acc.name = name;
      recordChange();
      render();
    }, 'Renommer');
  }

  function confirmDeleteAccount(acc) {
    showConfirm(`Supprimer "${acc.name}" et toutes ses données (Gaïa + Ouranos) ?`, () => {
      state.accounts = state.accounts.filter(a => a.id !== acc.id);
      if (state.activeAccountId === acc.id) state.activeAccountId = state.accounts[0]?.id || null;
      // If we were on the aggregated view but no longer have 2+ accounts, fall back
      if (state.activeAccountId === ALL_ACCOUNTS_ID && state.accounts.length < 2) {
        state.activeAccountId = state.accounts[0]?.id || null;
      }
      recordChange();
      render();
    });
  }

  // ============================================================
  // WIRE UP
  // ============================================================
  document.getElementById('exportBtn').onclick = exportData;
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();

  // --- Cloud sync ---
  document.getElementById('cloudSyncBtn').onclick = () => syncFromCloud('manual');
  document.getElementById('cloudStatus').onclick = onCloudStatusClick;
  document.getElementById('cloudViewerToggle').onchange = (e) => {
    setCloudViewer(e.target.checked);
    if (e.target.checked) syncFromCloud('auto');
  };
  // Rafraîchir quand on revient sur l'onglet (utile sur le téléphone), max 1×/30 s
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && Date.now() - lastCloudFetchAt > 30000) syncFromCloud('auto');
  });

  document.getElementById('importFile').onchange = (e) => {
    if (e.target.files[0]) importData(e.target.files[0]);
    e.target.value = '';
  };

  // Theme toggle
  function updateThemeButton() {
    const btn = document.getElementById('themeToggle');
    if (!btn) return;
    const current = document.documentElement.getAttribute('data-theme');
    btn.textContent = current === 'dark' ? '☀️' : '🌙';
    btn.title = current === 'dark' ? 'Passer en mode clair' : 'Passer en mode sombre';
  }
  document.getElementById('themeToggle').onclick = () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('equideow-theme', next); } catch (e) {}
    updateThemeButton();
  };
  updateThemeButton();

  // ============================================================
  // GLOBAL SEARCH (objects across all accounts)
  // ============================================================
  const searchInput = document.getElementById('globalSearch');
  const searchResults = document.getElementById('globalSearchResults');
  let searchKbdIndex = -1;

  function normaliseForSearch(s) {
    return (s || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, ''); // strip accents
  }

  function buildSearchResults(query) {
    const q = normaliseForSearch(query.trim());
    if (!q) return [];

    // Find matching catalog items, sorted by relevance
    const matches = state.itemCatalog
      .map(item => {
        const n = normaliseForSearch(item.name);
        if (!n.includes(q)) return null;
        // Score: exact start = 0 (best), word-start = 1, anywhere = 2
        let score = 2;
        if (n.startsWith(q)) score = 0;
        else if (n.split(/\s+/).some(w => w.startsWith(q))) score = 1;
        return { item, score };
      })
      .filter(Boolean)
      .sort((a, b) => a.score - b.score || a.item.name.localeCompare(b.item.name, 'fr'))
      .slice(0, 8); // cap result count

    // For each match, find all (account, server) pairs that hold > 0
    return matches.map(({ item }) => {
      const locations = [];
      let total = 0;
      state.accounts.forEach(a => {
        SERVERS.forEach(s => {
          const qty = getQty(a.servers[s], item.id);
          if (qty > 0) {
            locations.push({ accountId: a.id, accountName: a.name, server: s, qty });
            total += qty;
          }
        });
      });
      // Sort: by quantity desc, then account name
      locations.sort((x, y) => y.qty - x.qty || x.accountName.localeCompare(y.accountName, 'fr'));
      return { item, locations, total };
    });
  }

  function renderSearchResults() {
    const query = searchInput.value;
    if (!query.trim()) {
      searchResults.hidden = true;
      searchResults.innerHTML = '';
      searchKbdIndex = -1;
      return;
    }
    const results = buildSearchResults(query);
    if (results.length === 0) {
      searchResults.innerHTML = '<div class="global-search-empty">Aucun objet trouvé pour cette recherche.</div>';
      searchResults.hidden = false;
      searchKbdIndex = -1;
      return;
    }

    searchResults.innerHTML = results.map((r, gi) => {
      const imgUrl = r.item.imageUrl || imageUrlForSlug(r.item.slug);
      const imgHtml = imgUrl
        ? `<img src="${escapeHtml(imgUrl)}" alt="" onerror="this.style.display='none'">`
        : '';
      const locsHtml = r.locations.length === 0
        ? `<div class="gsr-location" style="cursor: default; color: var(--text-muted); font-style: italic;">Aucun stock — clique pour ouvrir l'inventaire</div>`
        : r.locations.map(l => `
            <div class="gsr-location" data-account-id="${l.accountId}" data-server="${l.server}">
              <span class="account-name">${escapeHtml(l.accountName)}</span>
              <span class="server-badge">${escapeHtml(SERVER_LABELS[l.server])}</span>
              <span class="qty">${l.qty}</span>
            </div>
          `).join('');
      const headerLocation = r.locations.length === 0
        ? `<div class="gsr-location" data-account-id="${state.accounts[0]?.id || ''}" data-server="${state.activeServer}" style="display:none;"></div>`
        : '';
      return `
        <div class="gsr-item-group">
          <div class="gsr-item-header">
            ${imgHtml}
            <span class="name">${escapeHtml(r.item.name)}</span>
            <span class="total">${r.total > 0 ? '∑ ' + r.total : 'aucun stock'}</span>
          </div>
          <div class="gsr-locations">${locsHtml}${headerLocation}</div>
        </div>
      `;
    }).join('');
    searchResults.hidden = false;
    searchKbdIndex = -1;
    wireSearchResultClicks();
  }

  function wireSearchResultClicks() {
    searchResults.querySelectorAll('.gsr-location[data-account-id]').forEach(el => {
      const id = el.getAttribute('data-account-id');
      const server = el.getAttribute('data-server');
      if (!id) return;
      el.onclick = () => goToAccountInventory(id, server);
    });
  }

  function goToAccountInventory(accountId, server) {
    state.activeAccountId = accountId;
    if (server && SERVERS.includes(server)) state.activeServer = server;
    state.currentView = 'inventory';
    inventorySortSnapshot = null;
    snapshotForKey = null;
    saveState();
    closeSearch();
    render();
  }

  function closeSearch() {
    searchResults.hidden = true;
    searchInput.value = '';
    searchKbdIndex = -1;
  }

  function getSearchSelectableItems() {
    return Array.from(searchResults.querySelectorAll('.gsr-location[data-account-id]'));
  }

  function moveSearchKbd(delta) {
    const items = getSearchSelectableItems();
    if (items.length === 0) return;
    items.forEach(i => i.classList.remove('kbd-active'));
    searchKbdIndex = (searchKbdIndex + delta + items.length) % items.length;
    items[searchKbdIndex].classList.add('kbd-active');
    items[searchKbdIndex].scrollIntoView({ block: 'nearest' });
  }

  searchInput.addEventListener('input', renderSearchResults);
  searchInput.addEventListener('focus', () => { if (searchInput.value) renderSearchResults(); });
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeSearch(); searchInput.blur(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); moveSearchKbd(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveSearchKbd(-1); }
    else if (e.key === 'Enter') {
      const items = getSearchSelectableItems();
      const target = (searchKbdIndex >= 0 ? items[searchKbdIndex] : items[0]);
      if (target) target.click();
    }
  });
  // Close on outside click
  document.addEventListener('click', (e) => {
    if (!searchResults.hidden &&
        !searchInput.contains(e.target) &&
        !searchResults.contains(e.target)) {
      searchResults.hidden = true;
    }
  });

  // ============================================================
  // KEYBOARD SHORTCUTS
  // ============================================================
  const isMac = /Mac|iPhone|iPad/.test(navigator.platform);
  const MOD_LABEL = isMac ? '⌘' : 'Ctrl';

  // Reflect the right shortcut in the search placeholder
  searchInput.placeholder = `🔍 Rechercher un objet sur tous les comptes (${MOD_LABEL}+K)…`;

  function isTyping(target) {
    if (!target) return false;
    const tag = target.tagName;
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' ||
           target.isContentEditable;
  }

  function cycleAccount(delta) {
    const sorted = state.accounts.slice().sort((a, b) =>
      a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' })
    );
    if (sorted.length === 0) return;
    // Handle "all accounts" view by treating it as a position after the last real account
    let currentIdx;
    if (isAllAccountsView()) {
      currentIdx = sorted.length;
    } else {
      currentIdx = sorted.findIndex(a => a.id === state.activeAccountId);
      if (currentIdx < 0) currentIdx = 0;
    }
    const allOptions = sorted.map(a => a.id);
    if (sorted.length >= 2) allOptions.push(ALL_ACCOUNTS_ID); // include the aggregated view
    const nextIdx = (currentIdx + delta + allOptions.length) % allOptions.length;
    const nextId = allOptions[nextIdx];
    state.activeAccountId = nextId;
    if (nextId === ALL_ACCOUNTS_ID) state.currentView = 'inventory';
    inventorySortSnapshot = null;
    snapshotForKey = null;
    saveState();
    render();
  }

  function switchToServer(server) {
    if (isAllAccountsView() || !getActiveAccount()) {
      // For aggregated view we still allow server switch
      state.activeServer = server;
      inventorySortSnapshot = null;
      snapshotForKey = null;
      saveState();
      render();
      return;
    }
    state.activeServer = server;
    inventorySortSnapshot = null;
    snapshotForKey = null;
    saveState();
    render();
  }

  function switchToView(view) {
    if (isAllAccountsView() && view !== 'inventory') return; // not allowed
    state.currentView = view;
    inventorySortSnapshot = null;
    snapshotForKey = null;
    saveState();
    render();
  }

  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + K → focus global search (works anywhere)
    if ((e.ctrlKey || e.metaKey) && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
      return;
    }
    // Ctrl/Cmd + Left/Right → cycle accounts
    if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
      if (isTyping(e.target)) return; // never steal focus from inputs
      e.preventDefault();
      cycleAccount(e.key === 'ArrowRight' ? 1 : -1);
      return;
    }
    // The remaining shortcuts must NOT fire while typing in inputs
    if (isTyping(e.target)) return;
    // No modifier keys for single-letter shortcuts
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    if (e.key === '?') { e.preventDefault(); showHelpModal(); return; }
    if (e.key === 'g' || e.key === 'G') { e.preventDefault(); switchToServer('gaia'); return; }
    if (e.key === 'o' || e.key === 'O') { e.preventDefault(); switchToServer('ouranos'); return; }
    if (e.key === 't' || e.key === 'T') { e.preventDefault(); switchToView('tasks'); return; }
    if (e.key === 'i' || e.key === 'I') { e.preventDefault(); switchToView('inventory'); return; }
    if (e.key === 'b' || e.key === 'B') { e.preventDefault(); switchToView('buses'); return; }
    if (e.key === '/') {
      // Focus current inventory search if visible, otherwise the global one
      const invSearch = document.getElementById('invSearch');
      if (invSearch) {
        e.preventDefault();
        invSearch.focus();
      } else {
        e.preventDefault();
        searchInput.focus();
      }
    }
  });

  function showHelpModal() {
    const c = document.getElementById('modalContainer');
    c.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal" style="width: 480px; max-width: 95vw;">
          <h3>⌨ Raccourcis clavier</h3>
          <table style="width: 100%; font-size: 14px; border-collapse: collapse;">
            <tbody>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Recherche globale</td><td style="padding: 6px 8px; text-align: right;"><kbd>${MOD_LABEL}</kbd> + <kbd>K</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Compte précédent / suivant</td><td style="padding: 6px 8px; text-align: right;"><kbd>${MOD_LABEL}</kbd> + <kbd>←</kbd> / <kbd>→</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Aller sur Gaïa</td><td style="padding: 6px 8px; text-align: right;"><kbd>G</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Aller sur Ouranos</td><td style="padding: 6px 8px; text-align: right;"><kbd>O</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Onglet Tâches</td><td style="padding: 6px 8px; text-align: right;"><kbd>T</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Onglet Inventaire</td><td style="padding: 6px 8px; text-align: right;"><kbd>I</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Onglet Buses</td><td style="padding: 6px 8px; text-align: right;"><kbd>B</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Recherche dans l'inventaire</td><td style="padding: 6px 8px; text-align: right;"><kbd>/</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Fermer une fenêtre</td><td style="padding: 6px 8px; text-align: right;"><kbd>Échap</kbd></td></tr>
              <tr><td style="padding: 6px 8px; color: var(--text-muted);">Afficher cette aide</td><td style="padding: 6px 8px; text-align: right;"><kbd>?</kbd></td></tr>
            </tbody>
          </table>
          <p style="font-size: 12px; color: var(--text-light); margin-top: 12px; font-style: italic;">Les raccourcis à une lettre (G, O, T, I, B, /, ?) ne fonctionnent que quand tu n'es pas en train de taper dans un champ.</p>
          <div class="modal-actions">
            <button class="btn primary" id="modalOk">Fermer</button>
          </div>
        </div>
      </div>
    `;
    const close = () => { c.innerHTML = ''; };
    document.getElementById('modalOk').onclick = close;
  }

  document.getElementById('helpBtn').onclick = showHelpModal;

  load();
})();
</script>
</body>
</html>
